const details = {"RQ": "<h3>Research Question</h3><p>How do spatial inequalities in PM2.5 exposure across California counties vary with income inequality (Gini) in 2019, and does the spatial relationship vary by urban\u2013rural classification?</p><p><b>Intent:</b> To understand the relationship between spatial inequalities in PM2.5 exposure and income inequality across California counties and investigate how this relationship varies by urban-rural classification.</p>", "obj_1": "<h3>Objective 1</h3><p><b>Title:</b> Assess how PM2.5 exposure varies across California counties in 2019 and whether county-level PM2.5 is spatially clustered</p><p><b>Hypothesis:</b> County-level annual PM2.5 exposure in 2019 is spatially clustered (positive global Moran\u2019s I) rather than randomly distributed across California.</p><p><b>Data Requirements:</b></p><ul><li><b>PM2.5_Annual_California_2019</b> (suitability: 7) \u2014 preprocessing: Filter to `year == 2019` and `pollutant_standard == 'PM25 Annual 2006'`, derive county `GEOID` from `state_code` and `county_code`, then aggregate `arithmetic_mean` to county mean.</li><li><b>california_counties_2019</b> (suitability: 10) \u2014 preprocessing: Left-join county PM2.5 summary to `california_counties_2019` on `GEOID`.</li></ul>", "obj1_s1": "<h3>Step 1.1</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"500\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">PM2.5_Annual_Califor</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"100\" height=\"30\" rx=\"6\" fill=\"#809bc8\" stroke=\"#4C72B0\" stroke-width=\"2\"/>\n  <text x=\"250.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">row_filter</text>\n  <line x1=\"300\" y1=\"25.0\" x2=\"330\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"330\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"410.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">pm25_2019_annual_recor</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> row_filter</p><p><b>Type:</b> data_wrangling</p><p><b>Input:</b> PM2.5_Annual_California_2019</p><p><b>Output Node:</b> pm25_2019_annual_records.csv</p><p><b>Description:</b> Filter `PM2.5_Annual_California_2019` to rows where `year == 2019` and `pollutant_standard == 'PM25 Annual 2006'`, keeping only `state_code`, `county_code`, `site_number`, and `arithmetic_mean`.</p>", "obj1_s2": "<h3>Step 1.2</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"511\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">pm25_2019_annual_rec</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"111\" height=\"30\" rx=\"6\" fill=\"#809bc8\" stroke=\"#4C72B0\" stroke-width=\"2\"/>\n  <text x=\"255.5\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">derive_column</text>\n  <line x1=\"311\" y1=\"25.0\" x2=\"341\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"341\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"421.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">pm25_2019_with_geoid.c</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> derive_column</p><p><b>Type:</b> data_wrangling</p><p><b>Input:</b> pm25_2019_annual_records.csv</p><p><b>Output Node:</b> pm25_2019_with_geoid.csv</p><p><b>Description:</b> Create county `GEOID` as a 5-character string by concatenating zero-padded `state_code` (2 digits) and zero-padded `county_code` (3 digits).</p>", "obj1_s3": "<h3>Step 1.3</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"580\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">pm25_2019_with_geoid</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"180\" height=\"30\" rx=\"6\" fill=\"#809bc8\" stroke=\"#4C72B0\" stroke-width=\"2\"/>\n  <text x=\"290.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">groupby_aggregate_mean_a</text>\n  <line x1=\"380\" y1=\"25.0\" x2=\"410\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"410\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"490.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">pm25_county_2019.csv</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> groupby_aggregate_mean_and_count</p><p><b>Type:</b> aggregation</p><p><b>Input:</b> pm25_2019_with_geoid.csv</p><p><b>Output Node:</b> pm25_county_2019.csv</p><p><b>Description:</b> Group by `GEOID` and compute `pm25_mean_2019 = mean(arithmetic_mean)` and `pm25_site_count_2019 = count(site_number)`.</p><p><b>Expected Output:</b> A county-level PM2.5 table with `GEOID`, `pm25_mean_2019`, and `pm25_site_count_2019`.</p>", "obj1_s4": "<h3>Step 1.4</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"518\" height=\"88\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">california_counties_</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"10\" y=\"48.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"67.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">pm25_county_2019.csv</text>\n  <line x1=\"170\" y1=\"63.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"29.0\" width=\"118\" height=\"30\" rx=\"6\" fill=\"#809bc8\" stroke=\"#4C72B0\" stroke-width=\"2\"/>\n  <text x=\"259.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">attribute_join</text>\n  <line x1=\"318\" y1=\"44.0\" x2=\"348\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"348\" y=\"29.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"428.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">counties_pm25_2019.gpk</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> attribute_join</p><p><b>Type:</b> geoprocessing</p><p><b>Input:</b> california_counties_2019, pm25_county_2019.csv</p><p><b>Output Node:</b> counties_pm25_2019.gpkg</p><p><b>Description:</b> Left-join `pm25_county_2019.csv` to `california_counties_2019` on `GEOID` to attach `pm25_mean_2019` and `pm25_site_count_2019` to county polygons.</p><p><b>Expected Output:</b> County polygons with `pm25_mean_2019` and `pm25_site_count_2019` attached.</p>", "obj1_s5": "<h3>Step 1.5</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"511\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_2019.g</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"111\" height=\"30\" rx=\"6\" fill=\"#809bc8\" stroke=\"#4C72B0\" stroke-width=\"2\"/>\n  <text x=\"255.5\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">derive_column</text>\n  <line x1=\"311\" y1=\"25.0\" x2=\"341\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"341\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"421.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">counties_pm25_2019_qc.</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> derive_column</p><p><b>Type:</b> data_wrangling</p><p><b>Input:</b> counties_pm25_2019.gpkg</p><p><b>Output Node:</b> counties_pm25_2019_qc.gpkg</p><p><b>Description:</b> Create `pm25_missing_2019` as a boolean indicator where `pm25_mean_2019` is null to identify counties with no monitor-derived PM2.5 summary in 2019.</p>", "obj1_s6": "<h3>Step 1.6</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"580\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_2019_q</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"180\" height=\"30\" rx=\"6\" fill=\"#809bc8\" stroke=\"#4C72B0\" stroke-width=\"2\"/>\n  <text x=\"290.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">spatial_weights_queen_co</text>\n  <line x1=\"380\" y1=\"25.0\" x2=\"410\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"410\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"490.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">ca_county_queen_weight</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> spatial_weights_queen_contiguity</p><p><b>Type:</b> geoprocessing</p><p><b>Input:</b> counties_pm25_2019_qc.gpkg</p><p><b>Output Node:</b> ca_county_queen_weights_2019.gpkg</p><p><b>Description:</b> Construct Queen contiguity spatial weights from county `geometry`, keyed by `GEOID`.</p>", "obj1_s7": "<h3>Step 1.7</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"525\" height=\"88\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_2019_q</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"10\" y=\"48.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#c7d3e7\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"67.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">ca_county_queen_weig</text>\n  <line x1=\"170\" y1=\"63.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"29.0\" width=\"125\" height=\"30\" rx=\"6\" fill=\"#809bc8\" stroke=\"#4C72B0\" stroke-width=\"2\"/>\n  <text x=\"262.5\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">global_morans_I</text>\n  <line x1=\"325\" y1=\"44.0\" x2=\"355\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"355\" y=\"29.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"435.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">pm25_global_moransI_20</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> global_morans_I</p><p><b>Type:</b> statistical</p><p><b>Input:</b> counties_pm25_2019_qc.gpkg, ca_county_queen_weights_2019.gpkg</p><p><b>Output Node:</b> pm25_global_moransI_2019.csv</p><p><b>Description:</b> Compute global Moran\u2019s I for `pm25_mean_2019` using the Queen contiguity weights.</p><p><b>Expected Output:</b> A table with Moran\u2019s I, expected I, variance, z-score, and p-value for `pm25_mean_2019` in 2019.</p>", "obj_2": "<h3>Objective 2</h3><p><b>Title:</b> Estimate the county-level association between PM2.5 exposure and income inequality (Gini) in 2019 and test whether residual spatial autocorrelation remains</p><p><b>Hypothesis:</b> Higher county income inequality (`B19083_001E:Gini Index`) is associated with higher county mean PM2.5 (`pm25_mean_2019`) in 2019, and OLS residuals exhibit spatial autocorrelation indicating the need for a spatial regression specification.</p><p><b>Data Requirements:</b></p><ul><li><b>California_Counties_Gini_2019</b> (suitability: 10) \u2014 preprocessing: Filter Gini to `year == 2019`, derive `GEOID` from `state_fips` and `county_fips`, then left-join to the county PM2.5 layer on `GEOID`.</li><li><b>counties_pm25_2019_qc.gpkg</b> (suitability: 10)</li><li><b>ca_county_queen_weights_2019.gpkg</b> (suitability: 10)</li><li><b>ca_county_knn_weights_2019.gpkg</b> (suitability: 10)</li></ul>", "obj2_s1": "<h3>Step 2.1</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"500\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#f8e6dc\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">California_Counties_</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"100\" height=\"30\" rx=\"6\" fill=\"#e9b191\" stroke=\"#DD8452\" stroke-width=\"2\"/>\n  <text x=\"250.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">row_filter</text>\n  <line x1=\"300\" y1=\"25.0\" x2=\"330\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"330\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"410.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">gini_2019_filtered.csv</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> row_filter</p><p><b>Type:</b> data_wrangling</p><p><b>Input:</b> California_Counties_Gini_2019</p><p><b>Output Node:</b> gini_2019_filtered.csv</p><p><b>Description:</b> Filter `California_Counties_Gini_2019` to rows where `year == 2019`, keeping only `state_fips`, `county_fips`, and `B19083_001E:Gini Index`.</p>", "obj2_s2": "<h3>Step 2.2</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"511\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#f8e6dc\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">gini_2019_filtered.c</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"111\" height=\"30\" rx=\"6\" fill=\"#e9b191\" stroke=\"#DD8452\" stroke-width=\"2\"/>\n  <text x=\"255.5\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">derive_column</text>\n  <line x1=\"311\" y1=\"25.0\" x2=\"341\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"341\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"421.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">gini_2019_with_geoid.c</text>\n</svg> \"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"348\" y=\"29.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"428.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">counties_pm25_gini_201</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> attribute_join</p><p><b>Type:</b> geoprocessing</p><p><b>Input:</b> counties_pm25_2019_qc.gpkg, gini_2019_with_geoid.csv</p><p><b>Output Node:</b> counties_pm25_gini_2019.gpkg</p><p><b>Description:</b> Left-join `gini_2019_with_geoid.csv` to `counties_pm25_2019_qc.gpkg` on `GEOID` to attach `B19083_001E:Gini Index` to each county.</p><p><b>Expected Output:</b> County polygons with `pm25_mean_2019` and `B19083_001E:Gini Index` for 2019.</p>", "obj2_s4": "<h3>Step 2.4</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"580\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#f8e6dc\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_2</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"180\" height=\"30\" rx=\"6\" fill=\"#e9b191\" stroke=\"#DD8452\" stroke-width=\"2\"/>\n  <text x=\"290.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">ordinary_least_squares_a</text>\n  <line x1=\"380\" y1=\"25.0\" x2=\"410\" y2=\"25.0\" st " font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_2</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"10\" y=\"48.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#f8e6dc\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"67.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">ca_county_queen_weig</text>\n  <line x1=\"170\" y1=\"63.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"29.0\" width=\"180\" height=\"30\" rx=\"6\" fill=\"#e9b191\" stroke=\"#DD8452\" stroke-width=\"2\"/>\n  <text x=\"290.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">spatial_lag_model_maximu</text>\n  <line x1=\"380\" y1=\"44.0\" x2=\"410\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"410\" y=\"29.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"490.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">spatial_lag_pm25_on_gi</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> spatial_lag_model_maximum_likelihood</p><p><b>Type:</b> statistical</p><p><b>Input:</b> counties_pm25_gini_2019.gpkg, ca_county_queen_weights_2019.gpkg</p><p><b>Output Node:</b> spatial_lag_pm25_on_gini_2019.csv</p><p><b>Description:</b> Fit a maximum-likelihood spatial lag (SAR) model with dependent variable `pm25_mean_2019` and predictor `B19083_001E:Gini Index` using the Queen contiguity weights keyed by `GEOID`.</p><p><b>Expected Output:</b> A table of spatial lag model estimates including the `B19083_001E:Gini Index` coefficient, the spatial autoregressive parameter, standard errors, and fit statistics.</p>", "obj2_s7": "<h3>Step 2.7</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"553\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#f8e6dc\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_2</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"153\" height=\"30\" rx=\"6\" fill=\"#e9b191\" stroke=\"#DD8452\" stroke-width=\"2\"/>\n  <text x=\"276.5\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">spatial_weights_knn</text>\n  <line x1=\"353\" y1=\"25.0\" x2=\"383\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"383\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"463.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">ca_county_knn_weights_</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> spatial_weights_knn</p><p><b>Type:</b> geoprocessing</p><p><b>Input:</b> counties_pm25_gini_2019.gpkg</p><p><b>Output Node:</b> ca_county_knn_weights_2019.gpkg</p><p><b>Description:</b> Construct K-nearest-neighbors (KNN) spatial weights with k=5 from county `geometry` centroids, keyed by `GEOID`.</p>", "obj2_s8": "<h3>Step 2.8</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"580\" height=\"88\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#f8e6dc\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_2</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"10\" y=\"48.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#f8e6dc\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"67.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">ca_county_knn_weight</text>\n  <line x1=\"170\" y1=\"63.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"29.0\" width=\"180\" height=\"30\" rx=\"6\" fill=\"#e9b191\" stroke=\"#DD8452\" stroke-width=\"2\"/>\n  <text x=\"290.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">spatial_error_model_maxi</text>\n  <line x1=\"380\" y1=\"44.0\" x2=\"410\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"410\" y=\"29.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"490.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">spatial_error_pm25_on_</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> spatial_error_model_maximum_likelihood</p><p><b>Type:</b> statistical</p><p><b>Input:</b> counties_pm25_gini_2019.gpkg, ca_county_knn_weights_2019.gpkg</p><p><b>Output Node:</b> spatial_error_pm25_on_gini_2019.csv</p><p><b>Description:</b> Fit a maximum-likelihood spatial error (SEM) model with dependent variable `pm25_mean_2019` and predictor `B19083_001E:Gini Index` using KNN weights (k=5) keyed by `GEOID`.</p><p><b>Expected Output:</b> A table of spatial error model estimates including the `B19083_001E:Gini Index` coefficient, the spatial error parameter, standard errors, and fit statistics.</p>", "obj_3": "<h3>Objective 3</h3><p><b>Title:</b> Test whether the 2019 PM2.5\u2013income inequality association differs by metro status at the county level</p><p><b>Hypothesis:</b> The association between `B19083_001E:Gini Index` and `pm25_mean_2019` differs by `Metro2013` status (effect modification).</p><p><b>Data Requirements:</b></p><ul><li><b>California_UrbanRural_Classification_2019</b> (suitability: 8) \u2014 preprocessing: Format `FIPSTXT` as 5-character county `GEOID` and left-join to the county PM2.5+Gini layer on `GEOID`.</li><li><b>counties_pm25_gini_2019.gpkg</b> (suitability: 10)</li><li><b>ca_county_queen_weights_2019.gpkg</b> (suitability: 10)</li></ul>", "obj3_s1": "<h3>Step 3.1</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"511\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#cae4d0\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">California_UrbanRura</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"111\" height=\"30\" rx=\"6\" fill=\"#87c294\" stroke=\"#55A868\" stroke-width=\"2\"/>\n  <text x=\"255.5\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">derive_column</text>\n  <line x1=\"311\" y1=\"25.0\" x2=\"341\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"341\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"421.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">urban_rural_with_geoid</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> derive_column</p><p><b>Type:</b> data_wrangling</p><p><b>Input:</b> California_UrbanRural_Classification_2019</p><p><b>Output Node:</b> urban_rural_with_geoid.csv</p><p><b>Description:</b> Create county `GEOID` as a 5-character string from `FIPSTXT` using zero-padding, and keep `GEOID`, `Metro2013`, `Nonmetro2013`, and `RuralUrbanContinuumCode2013`.</p>", "obj3_s2": "<h3>Step 3.2</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"518\" height=\"88\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#cae4d0\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_2</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"10\" y=\"48.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#cae4d0\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"67.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">urban_rural_with_geo</text>\n  <line x1=\"170\" y1=\"63.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"29.0\" width=\"118\" height=\"30\" rx=\"6\" fill=\"#87c294\" stroke=\"#55A868\" stroke-width=\"2\"/>\n  <text x=\"259.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">attribute_join</text>\n  <line x1=\"318\" y1=\"44.0\" x2=\"348\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"348\" y=\"29.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"428.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">counties_pm25_gini_urb</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> attribute_join</p><p><b>Type:</b> geoprocessing</p><p><b>Input:</b> counties_pm25_gini_2019.gpkg, urban_rural_with_geoid.csv</p><p><b>Output Node:</b> counties_pm25_gini_urbanrural_2019.gpkg</p><p><b>Description:</b> Left-join `urban_rural_with_geoid.csv` to `counties_pm25_gini_2019.gpkg` on `GEOID` to attach `Metro2013` to each county.</p><p><b>Expected Output:</b> County polygons with `pm25_mean_2019`, `B19083_001E:Gini Index`, and `Metro2013`.</p>", "obj3_s3": "<h3>Step 3.3</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"511\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#cae4d0\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_u</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"111\" height=\"30\" rx=\"6\" fill=\"#87c294\" stroke=\"#55A868\" stroke-width=\"2\"/>\n  <text x=\"255.5\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">derive_column</text>\n  <line x1=\"311\" y1=\"25.0\" x2=\"341\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"341\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"421.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">counties_pm25_gini_urb</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> derive_column</p><p><b>Type:</b> data_wrangling</p><p><b>Input:</b> counties_pm25_gini_urbanrural_2019.gpkg</p><p><b>Output Node:</b> counties_pm25_gini_urbanrural_interaction_2019.gpkg</p><p><b>Description:</b> Create interaction term `gini_x_metro = (B19083_001E:Gini Index) * Metro2013`.</p>", "obj3_s4": "<h3>Step 3.4</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"580\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#cae4d0\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_u</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"180\" height=\"30\" rx=\"6\" fill=\"#87c294\" stroke=\"#55A868\" stroke-width=\"2\"/>\n  <text x=\"290.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">ordinary_least_squares_w</text>\n  <line x1=\"380\" y1=\"25.0\" x2=\"410\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"410\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"490.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">ols_pm25_gini_metro_in</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> ordinary_least_squares_with_interaction</p><p><b>Type:</b> statistical</p><p><b>Input:</b> counties_pm25_gini_urbanrural_interaction_2019.gpkg</p><p><b>Output Node:</b> ols_pm25_gini_metro_interaction_2019.csv</p><p><b>Description:</b> Fit an OLS model with dependent variable `pm25_mean_2019` and predictors `B19083_001E:Gini Index`, `Metro2013`, and `gini_x_metro`, and report coefficient estimates, standard errors, and p-values.</p><p><b>Expected Output:</b> A coefficient table where the `gini_x_metro` term tests whether the `B19083_001E:Gini Index` slope differs by `Metro2013`.</p>", "obj3_s5": "<h3>Step 3.5</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"580\" height=\"88\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#cae4d0\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_u</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"10\" y=\"48.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#cae4d0\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"67.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">ca_county_queen_weig</text>\n  <line x1=\"170\" y1=\"63.0\" x2=\"200\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"29.0\" width=\"180\" height=\"30\" rx=\"6\" fill=\"#87c294\" stroke=\"#55A868\" stroke-width=\"2\"/>\n  <text x=\"290.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">spatial_lag_model_maximu</text>\n  <line x1=\"380\" y1=\"44.0\" x2=\"410\" y2=\"44.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"410\" y=\"29.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"490.0\" y=\"48.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">spatial_lag_pm25_gini_</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> spatial_lag_model_maximum_likelihood_with_interaction</p><p><b>Type:</b> statistical</p><p><b>Input:</b> counties_pm25_gini_urbanrural_interaction_2019.gpkg, ca_county_queen_weights_2019.gpkg</p><p><b>Output Node:</b> spatial_lag_pm25_gini_metro_interaction_2019.csv</p><p><b>Description:</b> Fit a maximum-likelihood spatial lag (SAR) model with dependent variable `pm25_mean_2019` and predictors `B19083_001E:Gini Index`, `Metro2013`, and `gini_x_metro` using Queen contiguity weights keyed by `GEOID`.</p><p><b>Expected Output:</b> A spatial lag model coefficient table where `gini_x_metro` quantifies metro effect modification under spatial dependence.</p>", "obj3_s6": "<h3>Step 3.6</h3><p style='color:#666;font-size:11px;margin-bottom:4px;'>Workflow</p><svg xmlns=\"http://www.w3.org/2000/svg\" width=\"580\" height=\"50\" style=\"display:block;margin:10px auto;\">\n  <defs><marker id=\"wfah\" markerWidth=\"8\" markerHeight=\"6\" refX=\"8\" refY=\"3\" orient=\"auto\"><polygon points=\"0 0,8 3,0 6\" fill=\"#666\"/></marker></defs>\n  <rect x=\"10\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#cae4d0\" stroke=\"#888\" stroke-width=\"1\"/>\n  <text x=\"90.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#333\">counties_pm25_gini_u</text>\n  <line x1=\"170\" y1=\"25.0\" x2=\"200\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"200\" y=\"10.0\" width=\"180\" height=\"30\" rx=\"6\" fill=\"#87c294\" stroke=\"#55A868\" stroke-width=\"2\"/>\n  <text x=\"290.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"bold\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#222\">groupwise_spearman_rank_</text>\n  <line x1=\"380\" y1=\"25.0\" x2=\"410\" y2=\"25.0\" stroke=\"#666\" stroke-width=\"1.5\" marker-end=\"url(#wfah)\"/>\n  <rect x=\"410\" y=\"10.0\" width=\"160\" height=\"30\" rx=\"6\" fill=\"#d4edda\" stroke=\"#28a745\" stroke-width=\"1.5\"/>\n  <text x=\"490.0\" y=\"29.0\" text-anchor=\"middle\" font-size=\"10\" font-family=\"Segoe UI,Arial,sans-serif\" fill=\"#155724\">pm25_gini_spearman_by_</text>\n</svg><hr style='border:none;border-top:1px solid #e9ecef;margin:12px 0;'><p><b>Operation:</b> groupwise_spearman_rank_correlation</p><p><b>Type:</b> statistical</p><p><b>Input:</b> counties_pm25_gini_urbanrural_2019.gpkg</p><p><b>Output Node:</b> pm25_gini_spearman_by_metro_2019.csv</p><p><b>Description:</b> Compute Spearman rank correlation between `pm25_mean_2019` and `B19083_001E:Gini Index` separately for counties where `Metro2013 == 1` and where `Metro2013 == 0`, reporting correlation and group sample size.</p><p><b>Expected Output:</b> A two-row table of metro vs nonmetro Spearman correlations with sample sizes.</p>"};

// ─── Zoom & Pan state ───
let scale = 1;
let panX = 0, panY = 0;
let isPanning = false;
let _wasDragged = false;
let panStartX = 0, panStartY = 0;
let _mdX = 0, _mdY = 0;
const PAN_THRESHOLD = 4;
const MIN_SCALE = 0.2;
const MAX_SCALE = 5;
const ZOOM_STEP = 0.15;
const svg = document.getElementById('flowchartSvg');
const zoomGroup = document.getElementById('zoomGroup');
const graphPanel = document.getElementById('graphPanel');

function applyTransform() {
  zoomGroup.setAttribute('transform', `translate(${panX}, ${panY}) scale(${scale})`);
  document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
}

function zoomIn() {
  scale = Math.min(MAX_SCALE, scale + ZOOM_STEP);
  applyTransform();
}

function zoomOut() {
  scale = Math.max(MIN_SCALE, scale - ZOOM_STEP);
  applyTransform();
}

function zoomReset() {
  scale = 1;
  panX = 0;
  panY = 0;
  applyTransform();
}

function zoomFit() {
  const bbox = zoomGroup.getBBox();
  const vb = svg.viewBox.baseVal;
  const pad = 30;
  const scaleX = (vb.width - pad * 2) / bbox.width;
  const scaleY = (vb.height - pad * 2) / bbox.height;
  scale = Math.min(scaleX, scaleY, MAX_SCALE);
  panX = (vb.width / scale - bbox.width) / 2 - bbox.x + pad / scale;
  panY = (vb.height / scale - bbox.height) / 2 - bbox.y + pad / scale;
  applyTransform();
}

// Mouse wheel zoom (centered on cursor)
graphPanel.addEventListener('wheel', function(e) {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;

  const vb = svg.viewBox.baseVal;
  const svgX = (mouseX / rect.width) * vb.width;
  const svgY = (mouseY / rect.height) * vb.height;

  const oldScale = scale;
  if (e.deltaY < 0) {
    scale = Math.min(MAX_SCALE, scale + ZOOM_STEP);
  } else {
    scale = Math.max(MIN_SCALE, scale - ZOOM_STEP);
  }

  // Adjust pan so zoom centers on cursor
  panX = svgX / scale - svgX / oldScale + panX;
  panY = svgY / scale - svgY / oldScale + panY;
  applyTransform();
}, { passive: false });

// Pan with left-click drag (or middle mouse)
graphPanel.addEventListener('mousedown', function(e) {
  if (e.button === 0 || e.button === 1) {
    e.preventDefault();
    isPanning = true;
    _wasDragged = false;
    panStartX = e.clientX;
    panStartY = e.clientY;
    _mdX = e.clientX;
    _mdY = e.clientY;
    graphPanel.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', function(e) {
  if (!isPanning) return;
  const dist = Math.abs(e.clientX - _mdX) + Math.abs(e.clientY - _mdY);
  if (dist > PAN_THRESHOLD) _wasDragged = true;
  const vb = svg.viewBox.baseVal;
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - panStartX) * (vb.width / rect.width) / scale;
  const dy = (e.clientY - panStartY) * (vb.height / rect.height) / scale;
  panX += dx;
  panY += dy;
  panStartX = e.clientX;
  panStartY = e.clientY;
  applyTransform();
});

window.addEventListener('mouseup', function() {
  if (isPanning) {
    isPanning = false;
    graphPanel.style.cursor = '';
  }
});

// Suppress node clicks after a drag
graphPanel.addEventListener('click', function(e) {
  if (_wasDragged) {
    e.stopPropagation();
    _wasDragged = false;
  }
}, true);

// ─── Node popup ───
function showPopup(nodeId) {
  const content = document.getElementById('popupContent');
  const overlay = document.getElementById('popupOverlay');
  if (details[nodeId]) {
    content.innerHTML = details[nodeId];
  } else {
    content.innerHTML = '<p style="color:#999; font-style:italic;">No details available.</p>';
  }
  overlay.classList.add('visible');

  // Highlight selected node
  document.querySelectorAll('.node-box rect, .node-box polygon').forEach(el => {
    el.setAttribute('stroke-width', '1.5');
    el.setAttribute('stroke', '#333');
  });
  const clicked = event.currentTarget.querySelector('rect, polygon');
  if (clicked) {
    clicked.setAttribute('stroke-width', '3.5');
    clicked.setAttribute('stroke', '#FFD700');
  }
}

function closePopup(e) {
  // If called from overlay click, only close if clicking the overlay itself
  if (e && e.target !== document.getElementById('popupOverlay')) return;
  document.getElementById('popupOverlay').classList.remove('visible');
  // Reset highlights
  document.querySelectorAll('.node-box rect, .node-box polygon').forEach(el => {
    el.setAttribute('stroke-width', '1.5');
    el.setAttribute('stroke', '#333');
  });
}

// Close on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePopup();
});

// Fit to view on initial load
window.addEventListener('DOMContentLoaded', function() {
  setTimeout(zoomFit, 100);
});
</script>
