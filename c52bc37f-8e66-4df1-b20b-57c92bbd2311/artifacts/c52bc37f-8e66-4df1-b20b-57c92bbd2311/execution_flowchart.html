<script>
const details = {"RQ": "<h3>Research Question</h3><p>How does proximity to hazardous waste facilities influence spatial patterns of asthma prevalence across census tracts of North Carolina, and how do these relationships vary spatially by socioeconomic and demographic context?</p>", "obj_1": "<h3>Objective 1</h3><p><b>Title:</b> Assess whether asthma prevalence is spatially clustered across North Carolina census tracts and whether hazardous-waste proximity aligns with high-asthma clusters</p><p><b>Hypothesis:</b> Census tracts with smaller nearest-site distance to hazardous waste facilities and/or larger hazardous-waste facility counts within 5000 meters have higher Asthma_prev and are overrepresented in statistically significant high-asthma clusters.</p>", "obj1_s1": "<h3 style=\"border-bottom-color:#4C72B0; display:flex; align-items:center; justify-content:space-between; gap:8px;\"><span style=\"cursor:pointer;\" onclick=\"goToStepCard('exec_obj1_step1')\">OBJECTIVE 1 | Step 1</span><button onclick=\"goToStepCard('exec_obj1_step1')\" style=\"font-size:0.65em; padding:3px 10px; border:1px solid #4a90d9; border-radius:4px; background:#f0f6ff; color:#2a6cb6; cursor:pointer; white-space:nowrap;\">Go to Card</button></h3><div class=\"meta-grid\"><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\"><span class=\"meta-label\">Agent</span><span class=\"meta-value\">DataAgent</span></div><div class=\"meta-item\" style=\"grid-column:span 2\"><span class=\"meta-label\">Description</span><span class=\"meta-value\">Reproject NC_tract to a common projected CRS in meters suitable for distance calculations while preserving GEOID.</span></div></div><div class=\"meta-item\" style=\"margin-bottom:12px\"><span class=\"meta-label\">Code File</span><span class=\"meta-value\">/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/generated_code/op_reproject_layer_76feeb46.py</span></div><div class=\"code-section\"><h4>Executed Code</h4><pre>import os\nimport geopandas as gpd\n\n# Paths\nINPUT_PATH = &quot;/bigdata/s0/tea5209/AGM/WebUI/uploads/c52bc37f-8e66-4df1-b20b-57c92bbd2311/NC_tract.gpkg&quot;\nOUTPUT_PATH = &quot;/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/nc_tract_projected.gpkg&quot;\nOUTPUT_DIR = os.path.dirname(OUTPUT_PATH)\nos.makedirs(OUTPUT_DIR, exist_ok=True)\n\n# Read\ngdf = gpd.read_file(INPUT_PATH)\n\n# Validate required columns exist (per inspection)\nrequired_cols = [&quot;GEOID&quot;, &quot;STATEFP&quot;, &quot;COUNTYFP&quot;, &quot;TRACTCE&quot;, &quot;geometry&quot;]\nmissing = [c for c in required_cols if c not in gdf.columns]\nif missing:\n    raise KeyError(f&quot;Missing required columns: {missing}. Available: {list(gdf.columns)}&quot;)\n\n# Ensure GEOID preserved as string\ngdf[&quot;GEOID&quot;] = gdf[&quot;GEOID&quot;].astype(str)\n\n# Basic geometry validity filtering (required before spatial ops)\ngdf = gdf[gdf.geometry.notnull()]\ngdf = gdf[gdf.geometry.is_valid &amp; ~gdf.geometry.is_empty].copy()\n\n# Choose a meter-based projected CRS suitable for North Carolina distance calculations:\n# EPSG:32119 = NAD83 / North Carolina (meters)\nTARGET_CRS = &quot;EPSG:32119&quot;\n\n# If source CRS is missing, stop (cannot reliably reproject)\nif gdf.crs is None:\n    raise ValueError(&quot;Input layer has no CRS defined; cannot reproject safely.&quot;)\n\n# Reproject\ngdf_proj = gdf.to_crs(TARGET_CRS)\n\n# Write to GeoPackage\nlayer_name = &quot;nc_tract_projected&quot;\nif os.path.exists(OUTPUT_PATH):\n    os.remove(OUTPUT_PATH)\ngdf_proj.to_file(OUTPUT_PATH, layer=layer_name, driver=&quot;GPKG&quot;)\n\n# Record dataset for deferred visualization (optional)\nrecord_data_to_viz(\n    output_dir=OUTPUT_DIR,\n    file_path=OUTPUT_PATH,\n    caption=&quot;North Carolina census tract polygons reprojected to a meter-based CRS (EPSG:32119) for distance calculations ay:flex; align-items:center; justify-content:space-between; gap:8px;\"><span style=\"cursor:pointer;\" onclick=\"goToStepCard('exec_obj1_step3')\">OBJECTIVE 1 | Step 3</span><button onclick=\"goToStepCard('exec_obj1_step3')\" style=\"font-size:0.65em; padding:3px 10px; border:1px solid #4a90d9; border-radius:4px; background:#f0f6ff; color:#2a6cb6; cursor:pointer; white-space:nowrap;\">Go to Card</button></h3><div class=\"meta-grid\"><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\"><span class=\"meta-label\">Agent</span><span class=\"meta-value\">DataAgent</span></div><div class=\"meta-item\" style=\"grid-column:span 2\"><span class=\"meta-label\">Description</span><span class=\"meta-value\">Compute tract centroids from nc_tract_projected.gpkg and retain GEOID for each centroid feature.</span></div></div><div class=\"meta-item\" style=\"margin-bottom:12px\"><span class=\"meta-label\">Code File</span><span class=\"meta-value\">/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/generated_code/op_centroid_e6941b6c.py</span></div><div class=\"code-section\"><h4>Executed Code</h4><pre>import os\nimport geopandas as gpd\n\nINPUT_PATH = &quot;/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/nc_tract_projected.gpkg&quot;\nOUTPUT_PATH = &quot;/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/nc_tract_centroids.gpkg&quot;\nOUTPUT_DIR = os.path.dirname(OUTPUT_PATH)\n\nos.makedirs(OUTPUT_DIR, exist_ok=True)\n\n# Read projected tract polygons\ntracts = gpd.read_file(INPUT_PATH)\n\n# Validate geometry before spatial operations\ntracts = tracts[tracts.geometry.is_valid &amp; ~tracts.geometry.is_empty].copy()\n\n# Ensure GEOID is present and non-null\ntracts = tracts.dropna(subset=[&quot;GEOID&quot;]).copy()\ntracts[&quot;GEOID&quot;] = tracts[&quot;GEOID&quot;].astype(str)\n\n# Compute centroids (input is projected, so planar centroids are appropriate)\ncentroids = tracts[[&quot;GEOID&quot;, &quot;geometry&quot;]].copy()\ncentroids[&quot;geometry&quot;] = centroids.geometry.centroid\ncentroids = gpd.GeoDataFrame(centroids, geometry=&quot;geometry&quot;, crs=tracts.crs)\n\n# Save centroid points to GeoPackage\ncentroids.to_file(OUTPUT_PATH, driver=&quot;GPKG&quot;, layer=&quot;nc_tract_centroids&quot;)\n\n# Optional: register as data-to-viz for downstream auto-rendering\nrecord_data_to_viz(\n    output_dir=OUTPUT_DIR,\n    file_path=OUTPUT_PATH,\n    caption=&quot;Centroid point locations for North Carolina Census tracts keyed by GEOID.&quot;,\n    viz_hint={&quot;type&quot;: &quot;point&quot;},\n    role=&quot;intermediate&quot;,\n)</pre></div><div class=\"code-section\"><h4>Created Files</h4><div class=\"files-list\"><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/manifest.json</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/nc_tract_centroids.gpkg</span></div></div>", "obj1_s4": "<h3 style=\"border-bottom-color:#4C72B0; display:flex; align-items:center; justify-content:space-between; gap:8px;\"><span style=\"cursor:pointer;\" onclick=\"goToStepCard('exec_obj1_step4')\">OBJECTIVE 1 | Step 4</span><button onclick=\"goToStepCard('exec_obj1_step4')\" style=\"font-size:0.65em; padding:3px 10px; border:1px solid #4a90d9; border-radius:4px; background:#f0f6ff; color:#2a6cb6; cursor:pointer; white-space:nowrap;\">Go to Card</button></h3><div class=\"meta-grid\"><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\"><span class=\"meta-label\">Agent</span><span class=\"meta-value\">DataAgent</span></div><div class=\"meta-item\" style=\"grid-column:span 2\"><span class=\"meta-label\">Description</span><span class=\"meta-value\">For each GEOID, co olumns)}&quot;)\n\n# -------------------------\n# Clean / validate geometry\n# -------------------------\ntract = tract[tract.geometry.notna()]\nhw = hw[hw.geometry.notna()]\n\ntract = tract[tract.geometry.is_valid &amp; ~tract.geometry.is_empty].copy()\nhw = hw[hw.geometry.is_valid &amp; ~hw.geometry.is_empty].copy()\n\ntract[&quot;GEOID&quot;] = tract[&quot;GEOID&quot;].astype(str).str.strip()\n\n# -------------------------\n# CRS harmonization: ensure projected CRS with meter units\n# -------------------------\ntarget_crs = tract.crs\nif target_crs is None or (hasattr(target_crs, &quot;is_geographic&quot;) and target_crs.is_geographic):\n    target_crs = &quot;EPSG:3857&quot;  # meter-based fallback if input is geographic/undefined\n\ntract = tract.to_crs(target_crs)\nhw = hw.to_crs(target_crs)\n\n# -------------------------\n# Metrics\n#   - nearest_hw_dist_m: nearest Euclidean distance from centroid to nearest HW point\n#   - hw_count_5km: count of HW points within 5000 m\n# -------------------------\n# Nearest distance\nif len(hw) == 0 or len(tract) == 0:\n    out = pd.DataFrame(\n        {\n            &quot;GEOID&quot;: tract[&quot;GEOID&quot;].values if len(tract) else [],\n            &quot;nearest_hw_dist_m&quot;: np.nan,\n            &quot;hw_count_5km&quot;: 0,\n        }\n    )\nelse:\n    nearest = gpd.sjoin_nearest(\n        tract[[&quot;GEOID&quot;, &quot;geometry&quot;]],\n        hw[[&quot;SITE_NAME&quot;, &quot;geometry&quot;]],\n        how=&quot;left&quot;,\n        distance_col=&quot;nearest_hw_dist_m&quot;,\n    )\n\n    dist_df = nearest[[&quot;GEOID&quot;, &quot;nearest_hw_dist_m&quot;]].copy()\n\n    # Count within 5km\n    tract_buf = tract[[&quot;GEOID&quot;, &quot;geometry&quot;]].copy()\n    tract_buf[&quot;geometry&quot;] = tract_buf.geometry.buffer(5000)\n\n    within = gpd.sjoin(\n        tract_buf,\n        hw[[&quot;SITE_NAME&quot;, &quot;geometry&quot;]],\n        how=&quot;left&quot;,\n        predicate=&quot;intersects&quot;,\n    )\n\n    count_df = (\n        within.groupby(&quot;GEOID&quot;, dropna=False)\n        .size()\n        .rename(&quot;hw_count_5km&quot;)\n        .reset_index()\n    )\n\n    # If a tract had no matches in left join, size() returns 1 (the left row) with NaNs on right.\n    # Correct by counting only non-null right-side matches.\n    # (In geopandas sjoin, right columns appear; we have SITE_NAME from right.)\n    count_df = (\n        within.assign(_has_match=within[&quot;SITE_NAME&quot;].notna().astype(int))\n        .groupby(&quot;GEOID&quot;, dropna=False)[&quot;_has_match&quot;]\n        .sum()\n        .rename(&quot;hw_count_5km&quot;)\n        .reset_index()\n    )\n\n    out = dist_df.merge(count_df, on=&quot;GEOID&quot;, how=&quot;left&quot;)\n    out[&quot;hw_count_5km&quot;] = out[&quot;hw_count_5km&quot;].fillna(0).astype(int)\n\n# -------------------------\n# Save\n# -------------------------\nout.to_csv(OUTPUT_CSV_PATH, index=False)</pre></div><div class=\"code-section\"><h4>Created Files</h4><div class=\"files-list\"><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/tract_proximity_metrics.csv</span></div></div>", "obj1_s5": "<h3 style=\"border-bottom-color:#4C72B0; display:flex; align-items:center; justify-content:space-between; gap:8px;\"><span style=\"cursor:pointer;\" onclick=\"goToStepCard('exec_obj1_step5')\">OBJECTIVE 1 | Step 5</span><button onclick=\"goToStepCard('exec_obj1_step5')\" style=\"font-size:0.65em; padding:3px 10px; border:1px solid #4a90d9; border-radius:4px; background:#f0f6ff; color:#2a6cb6; cursor:pointer; white-space:nowrap;\">Go to Card</button></h3><div class=\"meta-grid\"><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\"><span class=\"meta-label\">Agent</span><span class=\"meta-value\">DataAgent</span></div><div class=\"meta-item\" style=\"grid-col esults\ngdf[&quot;GiZ&quot;] = np.asarray(gi.Zs, dtype=float)\ngdf[&quot;GiP&quot;] = np.asarray(gi.p_sim, dtype=float)\n\n# ---------------------------------------------------------------------\n# Significance classification (hotspot/coldspot) based on p-value + sign(z)\n# ---------------------------------------------------------------------\ndef classify_gistar(z, p):\n    if not np.isfinite(z) or not np.isfinite(p):\n        return &quot;NoData&quot;\n    # Hotspots (positive z)\n    if z &gt; 0:\n        if p &lt;= 0.01:\n            return &quot;Hotspot_99&quot;\n        if p &lt;= 0.05:\n            return &quot;Hotspot_95&quot;\n        if p &lt;= 0.10:\n            return &quot;Hotspot_90&quot;\n        return &quot;NotSig&quot;\n    # Coldspots (negative z)\n    if z &lt; 0:\n        if p &lt;= 0.01:\n            return &quot;Coldspot_99&quot;\n        if p &lt;= 0.05:\n            return &quot;Coldspot_95&quot;\n        if p &lt;= 0.10:\n            return &quot;Coldspot_90&quot;\n        return &quot;NotSig&quot;\n    return &quot;NotSig&quot;\n\ngdf[&quot;GiClass&quot;] = [classify_gistar(z, p) for z, p in zip(gdf[&quot;GiZ&quot;], gdf[&quot;GiP&quot;])]\n\n# ---------------------------------------------------------------------\n# Save output\n# ---------------------------------------------------------------------\n# Keep all original attributes + Gi* outputs; ensure a stable schema\nout_gdf = gdf.copy()\n\n# GeoPackage write\nout_gdf.to_file(OUTPUT_PATH, driver=&quot;GPKG&quot;)\n\n# Manuscript artifact (auto-render choropleth later)\nrecord_data_to_viz(\n    output_dir=OUTPUT_DIR,\n    file_path=OUTPUT_PATH,\n    caption=&quot;Census tract Getis-Ord Gi* hotspot/coldspot classification for asthma prevalence (Queen contiguity).&quot;,\n    viz_hint={&quot;type&quot;: &quot;choropleth&quot;, &quot;column&quot;: &quot;GiZ&quot;, &quot;cmap&quot;: &quot;RdBu_r&quot;},\n    role=&quot;final&quot;,\n)</pre></div><div class=\"code-section\"><h4>Created Files</ itney_summary(data: pd.DataFrame, value_col: str, group_col: str = &quot;is_hotspot&quot;):\n    sub = data[[value_col, group_col]].dropna().copy()\n    hotspot_vals = sub.loc[sub[group_col] == True, value_col].to_numpy()\n    nonhot_vals = sub.loc[sub[group_col] == False, value_col].to_numpy()\n\n    result = {\n        &quot;n_hotspot&quot;: int(hotspot_vals.size),\n        &quot;n_nonhotspot&quot;: int(nonhot_vals.size),\n        &quot;median_hotspot&quot;: float(np.nanmedian(hotspot_vals)) if hotspot_vals.size else None,\n        &quot;median_nonhotspot&quot;: float(np.nanmedian(nonhot_vals)) if nonhot_vals.size else None,\n        &quot;u_statistic&quot;: None,\n        &quot;p_value&quot;: None,\n        &quot;alternative&quot;: &quot;two-sided&quot;,\n    }\n\n    if hotspot_vals.size == 0 or nonhot_vals.size == 0:\n        return result\n\n    # Mann\u2013Whitney U test (two-sided)\n    u = mannwhitneyu(hotspot_vals, nonhot_vals, alternative=&quot;two-sided&quot;, method=&quot;auto&quot;)\n    result[&quot;u_statistic&quot;] = float(u.statistic)\n    result[&quot;p_value&quot;] = float(u.pvalue)\n    return result\n\n\nresults = {\n    &quot;hotspot_definition&quot;: {&quot;GiP&quot;: &quot;&lt; 0.05&quot;, &quot;GiZ&quot;: &quot;&gt; 0&quot;},\n    &quot;overall_counts&quot;: {\n        &quot;n_total_valid_geom&quot;: int(len(gdf)),\n        &quot;n_total_with_GiP_GiZ&quot;: int(len(df)),\n        &quot;n_hotspot&quot;: int(df[&quot;is_hotspot&quot;].sum()),\n        &quot;n_nonhotspot&quot;: int((~df[&quot;is_hotspot&quot;]).sum()),\n    },\n    &quot;tests&quot;: {\n        &quot;nearest_hw_dist_m&quot;: mannwhitney_summary(df, &quot;nearest_hw_dist_m&quot;),\n        &quot;hw_count_5km&quot;: mannwhitney_summary(df, &quot;hw_count_5km&quot;),\n    },\n}\n\n# ----------------------------\n# Save primary output JSON\n# ----------------------------\nwith open(OUTPUT_PATH, &quot;w&quot;, encoding=&quot;utf-8&quot;) as f:\n    json.dump(results, f, indent=2)\n\n# ----------------------------\n# Secondary output: comparative boxplots (optional manuscript artifact)\n# ----------------------------\nplot_df = df[[&quot;is_hotspot&quot;, &quot;nearest_hw_dist_m&quot;, &quot;hw_count_5km&quot;]].copy()\nplot_df[&quot;Group&quot;] = np.where(plot_df[&quot;is_hotspot&quot;], &quot;Hotspot (GiP&lt;0.05, GiZ&gt;0)&quot;, &quot;Other tracts&quot;)\n\nfig, axes = plt.subplots(1, 2, figsize=(12, 5))\n\n# nearest_hw_dist_m\ntmp = plot_df[[&quot;Group&quot;, &quot;nearest_hw_dist_m&quot;]].dropna()\naxes[0].boxplot(\n    [tmp.loc[tmp[&quot;Group&quot;].str.startswith(&quot;Hotspot&quot;), &quot;nearest_hw_dist_m&quot;].to_numpy(),\n     tmp.loc[~tmp[&quot;Group&quot;].str.startswith(&quot;Hotspot&quot;), &quot;nearest_hw_dist_m&quot;].to_numpy()],\n    tick_labels=[&quot;Hotspot&quot;, &quot;Other&quot;],\n    showfliers=False,\n)\naxes[0].set_title(&quot;Nearest HW distance (m)&quot;)\naxes[0].set_ylabel(&quot;nearest_hw_dist_m&quot;)\n\n# hw_count_5km\ntmp = plot_df[[&quot;Group&quot;, &quot;hw_count_5km&quot;]].dropna()\naxes[1].boxplot(\n    [tmp.loc[tmp[&quot;Group&quot;].str.startswith(&quot;Hotspot&quot;), &quot;hw_count_5km&quot;].to_numpy(),\n     tmp.loc[~tmp[&quot;Group&quot;].str.startswith(&quot;Hotspot&quot;), &quot;hw_count_5km&quot;].to_numpy()],\n    tick_labels=[&quot;Hotspot&quot;, &quot;Other&quot;],\n    showfliers=False,\n)\naxes[1].set_title(&quot;HW count within 5 km&quot;)\naxes[1].set_ylabel(&quot;hw_count_5km&quot;)\n\nplt.tight_layout()\nfig_path = os.path.join(OUTPUT_DIR, &quot;hotspot_vs_nonhotspot_proximity_boxplots.png&quot;)\nplt.savefig(fig_path, dpi=200, bbox_inches=&quot;tight&quot;)\nplt.close()\n\nrecord_figure(\n    output_dir=OUTPUT_DIR,\n    file_path=fig_path,\n    caption=&quot;Boxplots comparing nearest hardware distance and hardware counts within 5 km between significant asthma hotspots (Gi* p&lt;0.05, z&gt;0) and all other tracts.&quot;,\n    role=&quot;promoted&quot;,\n    objective_key=&quot;objective_1&quot;,\n    step_index=1,\n)</pre></div><div class=\"code-section\"><h4>Created Files</h4><div class=\"files-list\"><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/hotspot_proximity_comparison.json</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/hotspot_vs_nonhotspot_proximity_boxplots.png</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/c52bc37f-8e66-4df1-b20b-57c92bbd2311/manifest.json</span></div></div>", "obj_2": "<h3>Objective 2</h3><p><b>Title:</b> Estimate how the hazardous-waste proximity\u2013asthma association varies by socioeconomic and demographic context and whether the association is spatially non-stationary</p><p><b>Hypothesis:</b> After adjustment for tract context, the association between hazardous waste proximity and Asthma_prev is stronger in tracts with higher ratio_poverty, higher ratio_uninsured, and higher ratio_black, and the proximity effect varies across space.</p>", "obj2_s1": "<h3 style=\"border-bottom-color:#DD8452; display:flex; align-items:center; justify-content:space-between; gap:8px;\"><span style=\"cursor:pointer;\" onclick=\"goToStepCard('exec_obj2_step1')\">OBJECTIVE 2 | Step 1</span><button onclick=\"goToStepCard('exec_obj2_step1')\" style=\"font-size:0.65em; padding:3px 10px; border:1px solid #4a90d9; border-radius:4px; background:#f0f6ff; color:#2a6cb6; cursor:pointer; white-space:nowrap;\">Go to Card</button></h3><div class=\"meta-grid\"><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\"><span class=\"meta-label\">Agent</span><span class=\"meta-value\">DataAgent</span></div><div class=\"meta-item\" style=\"grid-column:span 2\"><span class=\"meta-label\">Description</span><span class=\"meta-value\">Left-join NC_ACS_data to asthma_proximity.csv on GEOID and retain GEOID, As  = pd.to_numeric(asthma_prox[c], errors=&quot;coerce&quot;)\n\nfor c in num_cols_acs:\n    acs[c] = pd.to_numeric(acs[c], errors=&quot;coerce&quot;)\n\n# Replace common Census sentinels with NaN (if present after numeric coercion)\nacs = acs.replace([-666666666, -888888888, -999999999], np.nan)\n\n# Ensure right-side key uniqueness to avoid row explosion\nacs = acs.drop_duplicates(subset=[&quot;GEOID&quot;]).copy()\n\n# ----------------------------\n# Left join (asthma_proximity left, ACS right)\n# ----------------------------\nmerged = asthma_prox.merge(acs, on=&quot;GEOID&quot;, how=&quot;left&quot;, validate=&quot;m:1&quot;)\n\n# ----------------------------\n# Retain requested columns only\n# ----------------------------\nkeep_cols = [\n    &quot;GEOID&quot;,\n    &quot;Asthma_prev&quot;,\n    &quot;nearest_hw_dist_m&quot;,\n    &quot;hw_count_5km&quot;,\n    &quot;ratio_poverty&quot;,\n    &quot;ratio_uninsured&quot;,\n    &quot;med_income&quot;,\n    &quot;ratio_black&quot;,\n    &quot;ratio_hispanic&quot;,\n]\nmerged = merged.loc[:, keep_cols].copy()\n\n# ----------------------------\n# Join audit\n# ----------------------------\naudit_col = &quot;ratio_poverty&quot;\nmatched = int(merged[audit_col].notna().sum())\ntotal = int(len(merged))\nmatch_rate = matched / total if total else 0.0\nunmatched_n = total - matched\n\naudit_lines = [\n    &quot;[JOIN AUDIT] asthma_proximity (left) + NC_ACS_data (right) on GEOID&quot;,\n    f&quot;  left rows: {total}&quot;,\n    f&quot;  matched rows (non-null &#x27;{audit_col}&#x27; after join): {matched}/{total} ({match_rate:.1%})&quot;,\n    f&quot;  unmatched left rows (null &#x27;{audit_col}&#x27;): {unmatched_n}&quot;,\n]\n\nif match_rate &lt; 0.9:\n    audit_lines.append(&quot;  WARNING: match rate below 90% \u2014 inspect GEOID formatting/coverage.&quot;)\n    audit_lines.append(f&quot;    left GEOID sample: {asthma_prox[&#x27;GEOID&#x27;].head(5).tolist()}&quot;)\n    audit_lines.append(f&quot;    right GEOID sampl </div><div class=\"code-section\"><h4>Content Preview</h4><pre style=\"color:#e2e8f0;max-height:400px;\"># Spatial Patterns of Asthma Prevalence and Hazardous Waste Proximity in North Carolina Census Tracts\n\n## Abstract\n\n**Background and Purpose:** Environmental justice research increasingly emphasizes that health burdens and environmental hazards co-occur in space, yet the degree to which asthma prevalence clusters geographically and aligns with hazardous-waste proximity across North Carolina census tracts remains incompletely quantified. This study evaluates tract-level spatial clustering of asthma prevalence and tests whether hazardous-waste proximity is elevated in statistically significant high-asthma clusters, while also assessing spatial non-stationarity in the proximity\u2013asthma association. **Methods:** Asthma prevalence (PLACES) was linked to North Carolina census tracts (n = 2,192 polygons; 2,169 with non-missing asthma prevalence) and to 200 hazardous-waste facility point locations. For each tract centroid, Euclidean nearest-facility distance (meters) and facility counts within 5 km were computed, then joined to tract polygons for spatial statistics. Global spatial autocorrelation was assessed using Global Moran\u2019s $I$ (queen contiguity; 999 permutations), local clustering was mapped with Getis\u2013Ord Gi*, and hotspot vs. non-hotspot differences in proximity metrics were tested using Mann\u2013Whitney U. To evaluate contextual heterogeneity and spatial non-stationarity, an ordinary least squares model with interaction terms (heteroskedasticity-robust HC1 errors) and a geographi</pre></div>"};

let isPanning = false;
let _wasDragged = false;
let panStartX = 0, panStartY = 0;
let _mdX = 0, _mdY = 0;
const PAN_THRESHOLD = 4;
const MIN_SCALE = 0.2;
const MAX_SCALE = 5;
const ZOOM_STEP = 0.15;
const svg = document.getElementById('flowchartSvg');
const zoomGroup = document.getElementById('zoomGroup');
const graphPanel = document.getElementById('graphPanel');

function applyTransform() {
  zoomGroup.setAttribute('transform', `translate(${panX}, ${panY}) scale(${scale})`);
  document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
}

function zoomIn() {
  scale = Math.min(MAX_SCALE, scale + ZOOM_STEP);
  applyTransform();
}

function zoomOut() {
  scale = Math.max(MIN_SCALE, scale - ZOOM_STEP);
  applyTransform();
}

function zoomReset() {
  scale = 1; panX = 0; panY = 0;
  applyTransform();
}

function zoomFit() {
  const bbox = zoomGroup.getBBox();
  const vb = svg.viewBox.baseVal;
  const pad = 30;
  const scaleX = (vb.width - pad * 2) / bbox.width;
  const scaleY = (vb.height - pad * 2) / bbox.height;
  scale = Math.min(scaleX, scaleY, MAX_SCALE);
  panX = (vb.width / scale - bbox.width) / 2 - bbox.x + pad / scale;
  panY = (vb.height / scale - bbox.height) / 2 - bbox.y + pad / scale;
  applyTransform();
}

function toggleFullscreen() {
  const elem = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
      elem.webkitRequestFullscreen();
    }
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
  }
}

document.addEventListener('fullscreenchange', function() {
  const btn = document.getElementById('fullscreenBtn');
  if (document.fullscreenElement) {
    btn.innerHTML = '&#x2716;';
    btn.title = 'Exit fullscreen';
  } else {
    btn.innerHTML = '&#x26F6;';
    btn.title = 'Toggle fullscreen';
  }
  setTimeout(zoomFit, 200);
});

// Mouse wheel zoom (centered on cursor)
graphPanel.addEventListener('wheel', function(e) {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const vb = svg.viewBox.baseVal;
  const svgX = (mouseX / rect.width) * vb.width;
  const svgY = (mouseY / rect.height) * vb.height;
  const oldScale = scale;
  if (e.deltaY < 0) {
    scale = Math.min(MAX_SCALE, scale + ZOOM_STEP);
  } else {
    scale = Math.max(MIN_SCALE, scale - ZOOM_STEP);
  }
  panX = svgX / scale - svgX / oldScale + panX;
  panY = svgY / scale - svgY / oldScale + panY;
  applyTransform();
}, { passive: false });

// Pan with left-click drag (or middle mouse)
graphPanel.addEventListener('mousedown', function(e) {
  if (e.button === 0 || e.button === 1) {
    e.preventDefault();
    isPanning = true;
    _wasDragged = false;
    panStartX = e.clientX;
    panStartY = e.clientY;
    _mdX = e.clientX;
    _mdY = e.clientY;
    graphPanel.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', function(e) {
  if (!isPanning) return;
  const dist = Math.abs(e.clientX - _mdX) + Math.abs(e.clientY - _mdY);
  if (dist > PAN_THRESHOLD) _wasDragged = true;
  const vb = svg.viewBox.baseVal;
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - panStartX) * (vb.width / rect.width) / scale;
  const dy = (e.clientY - panStartY) * (vb.height / rect.height) / scale;
  panX += dx;
  panY += dy;
  panStartX = e.clientX;
  panStartY = e.clientY;
  applyTransform();
});

window.addEventListener('mouseup', function() {
  if (isPanning) {
    isPanning = false;
    graphPanel.style.cursor = '';
  }
});

// Suppress node clicks after a drag
graphPanel.addEventListener('click', function(e) {
  if (_wasDragged) {
    e.stopPropagation();
    _wasDragged = false;
  }
}, true);

// Node popup
function showPopup(nodeId) {
  const content = document.getElementById('popupContent');
  const overlay = document.getElementById('popupOverlay');
  if (details[nodeId]) {
    content.innerHTML = details[nodeId];
  } else {
    content.innerHTML = '<p style="color:#999; font-style:italic;">No details available.</p>';
  }
  overlay.classList.add('visible');

  // Highlight selected node
  document.querySelectorAll('.node-box rect, .node-box polygon').forEach(el => {
    el.setAttribute('stroke-width', el.tagName === 'polygon' ? '2' : '1.5');
    el.setAttribute('stroke', el.dataset.origStroke || '#333');
  });
  const clicked = event.currentTarget.querySelector('rect, polygon');
  if (clicked) {
    clicked.setAttribute('stroke-width', '3.5');
    clicked.setAttribute('stroke', '#FFD700');
  }
}

function closePopup(e) {
  if (e && e.target !== document.getElementById('popupOverlay')) return;
  document.getElementById('popupOverlay').classList.remove('visible');
  document.querySelectorAll('.node-box rect, .node-box polygon').forEach(el => {
    el.setAttribute('stroke-width', el.tagName === 'polygon' ? '2' : '1.5');
    el.setAttribute('stroke', el.dataset.origStroke || '#333');
  });
}

// Navigate to the step card in the parent WebUI
function goToStepCard(phase) {
  closePopup();
  // If inside an iframe, post message to parent; otherwise try directly
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'scrollToStepCard', phase: phase }, '*');
  } else {
    // Standalone — try finding the card in this document
    const card = document.getElementById('wf-card-' + phase);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePopup();
});

// Store original stroke colors
document.querySelectorAll('.node-box rect, .node-box polygon').forEach(el => {
  el.dataset.origStroke = el.getAttribute('stroke') || '#333';
});

// Fit to view on initial load
window.addEventListener('DOMContentLoaded', function() {
  setTimeout(zoomFit, 100);
});
</script>
