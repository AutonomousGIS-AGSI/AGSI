<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manuscripts &middot; AGSI</title>
<style>
  :root {
    --bg: #2a2a2e;
    --panel: #353539;
    --panel-hover: #3f3f44;
    --border: #45454b;
    --border-strong: #54545a;
    --text: #ececec;
    --muted: #aeaeb6;
    --accent: #d6b878;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: #e3c587; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 64px 28px 96px; }
  .crumb { font-size: .82rem; color: var(--muted); margin-bottom: 18px; letter-spacing: .04em; }
  .crumb a { color: var(--muted); }
  .crumb a:hover { color: var(--text); }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: 2rem;
    margin: 0 0 12px;
  }
  .lede { color: #c5c5cc; margin: 0 0 40px; max-width: 60ch; }

  ul.list { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
  .item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    padding: 16px 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: background .15s, border-color .15s;
  }
  .item:hover { background: var(--panel-hover); border-color: var(--border-strong); }
  .item .name { font-size: 1rem; color: var(--text); }
  .item .meta { font-size: .82rem; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <div class="crumb"><a href="../index.html">&larr; AGSI</a></div>
  <h1>Manuscripts</h1>
  <p class="lede">Final write-ups produced from each AGM session. Click to open the PDF in your browser.</p>

  <ul class="list">
    <li><a class="item" href="Case%201.pdf"><span class="name">Case 1</span><span class="meta">PDF</span></a></li>
    <li><a class="item" href="Case%202_v2.pdf"><span class="name">Case 2 &mdash; v2 (current)</span><span class="meta">PDF</span></a></li>
    <li><a class="item" href="Case2_v1.pdf"><span class="name">Case 2 &mdash; v1</span><span class="meta">PDF</span></a></li>
    <li><a class="item" href="Case%203.pdf"><span class="name">Case 3</span><span class="meta">PDF</span></a></li>
  </ul>
</div>
</body>
</html>
