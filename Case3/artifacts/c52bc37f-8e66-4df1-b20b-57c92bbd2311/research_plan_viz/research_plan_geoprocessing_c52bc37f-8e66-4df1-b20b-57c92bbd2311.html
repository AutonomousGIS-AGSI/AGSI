const details = {"o1_s1_i0": "<h3>Input Data</h3><p><b>Name:</b> NC_tract</p>", "o1_s1_op": "<h3>Step 1.1: reproject_layer</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> NC_tract</p><p><b>Output:</b> nc_tract_projected.gpkg</p><p><b>Description:</b> Reproject NC_tract to a common projected CRS in meters suitable for distance calculations while preserving GEOID.</p><p><b>Expected Output:</b> Projected tract polygons with GEOID in a meter-based CRS.</p>", "o1_s1_out": "<h3>Output Data</h3><p><b>Name:</b> nc_tract_projected.gpkg</p><p><b>Description:</b> Projected tract polygons with GEOID in a meter-based CRS.</p>", "o1_s2_i0": "<h3>Input Data</h3><p><b>Name:</b> NC_HW_sites</p>", "o1_s2_op": "<h3>Step 1.2: reproject_layer</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> NC_HW_sites</p><p><b>Output:</b> nc_hw_sites_projected.gpkg</p><p><b>Description:</b> Reproject NC_HW_sites to the same projected CRS used for nc_tract_projected.gpkg while preserving SITE_NAME.</p><p><b>Expected Output:</b> Projected hazardous waste facility points in the same meter-based CRS as the tracts.</p>", "o1_s2_out": "<h3>Output Data</h3><p><b>Name:</b> nc_hw_sites_projected.gpkg</p><p><b>Description:</b> Projected hazardous waste facility points in the same meter-based CRS as the tracts.</p>", "o1_s3_op": "<h3>Step 1.3: centroid</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> nc_tract_projected.gpkg</p><p><b>Output:</b> nc_tract_centroids.gpkg</p><p><b>Description:</b> Compute tract centroids from nc_tract_projected.gpkg and retain GEOID for each centroid feature.</p><p><b>Expected Output:</b> Tract centroid point features keyed by GEOID.</p>", "o1_s3_out": "<h3>Output Data</h3><p><b>Name:</b> nc_tract_centroids.gpkg</p><p><b>Description:</b> Tract centroid point features keyed by GEOID.</p>", "o1_s4_op": "<h3>Step 1.4: nearest_neighbor_distance_and_buffer_count</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> nc_tract_centroids.gpkg, nc_hw_sites_projected.gpkg</p><p><b>Output:</b> tract_proximity_metrics.csv</p><p><b>Description:</b> For each GEOID, compute nearest_hw_dist_m as the Euclidean distance in meters from the tract centroid to the nearest hazardous waste facility point and compute hw_count_5km as the count of hazardous waste facility points within 5000 meters of the centroid.</p><p><b>Expected Output:</b> A GEOID-keyed table with nearest_hw_dist_m and hw_count_5km.</p>", "o1_s4_out": "<h3>Output Data</h3><p><b>Name:</b> tract_proximity_metrics.csv</p><p><b>Description:</b> A GEOID-keyed table with nearest_hw_dist_m and hw_count_5km.</p>", "o1_s5_i0": "<h3>Input Data</h3><p><b>Name:</b> NC_PLACES</p>", "o1_s5_op": "<h3>Step 1.5: left_join</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> NC_PLACES, tract_proximity_metrics.csv</p><p><b>Output:</b> asthma_proximity.csv</p><p><b>Description:</b> Left-join tract_proximity_metrics.csv to NC_PLACES on GEOID and retain GEOID, Asthma_prev, nearest_hw_dist_m, and hw_count_5km.</p><p><b>Expected Output:</b> A GEOID-keyed table containing Asthma_prev and hazardous-waste proximity metrics.</p>", "o1_s5_out": "<h3>Output Data</h3><p><b>Name:</b> asthma_proximity.csv</p><p><b>Description:</b> A GEOID-keyed table containing Asthma_prev and hazardous-waste proximity metrics.</p>", "o1_s6_op": "<h3>Step 1.6: attribute_join</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> nc_tract_projected.gpkg, asthma_proximity.csv</p><p><b>Output:</b> tract_asthma_proximity.gpkg</p><p><b>Description:</b> Join asthma_proximity.csv to nc_tract_projected.gpkg by GEOID to create tract polygons with attributes Asthma_prev, nearest_hw_dist_m, and hw_count_5km.</p><p><b>Expected Output:</b> Tract polygons with Asthma_prev and proximity attributes suitable for spatial statistics.</p>", "o1_s6_out": "<h3>Output Data</h3><p><b>Name:</b> tract_asthma_proximity.gpkg</p><p><b>Description:</b> Tract polygons with Asthma_prev and proximity attributes suitable for spatial statistics.</p>", "o1_s7_op": "<h3>Step 1.7: global_morans_I</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> tract_asthma_proximity.gpkg</p><p><b>Output:</b> global_moransI_asthma.json</p><p><b>Description:</b> Compute Global Moran\u2019s I for Asthma_prev using queen contiguity weights defined on tract polygons and permutation-based p-values.</p><p><b>Expected Output:</b> Global Moran\u2019s I results for Asthma_prev including statistic, z-score, and permutation p-value.</p>", "o1_s7_out": "<h3>Output Data</h3><p><b>Name:</b> global_moransI_asthma.json</p><p><b>Description:</b> Global Moran\u2019s I results for Asthma_prev including statistic, z-score, and permutation p-value.</p>", "o1_s8_op": "<h3>Step 1.8: getis_ord_gi_star</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> tract_asthma_proximity.gpkg</p><p><b>Output:</b> asthma_hotspots.gpkg</p><p><b>Description:</b> Compute Getis-Ord Gi* for Asthma_prev using queen contiguity weights on tract polygons and write Gi* z-scores and p-value-based significance class per GEOID.</p><p><b>Expected Output:</b> Tract polygons with Gi* z-scores and hotspot/coldspot significance classification for Asthma_prev.</p>", "o1_s8_out": "<h3>Output Data</h3><p><b>Name:</b> asthma_hotspots.gpkg</p><p><b>Description:</b> Tract polygons with Gi* z-scores and hotspot/coldspot significance classification for Asthma_prev.</p>", "o1_s9_op": "<h3>Step 1.9: mann_whitney_u_test</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> asthma_hotspots.gpkg</p><p><b>Output:</b> hotspot_proximity_comparison.json</p><p><b>Description:</b> Using asthma_hotspots.gpkg, subset tracts to statistically significant hotspots for Asthma_prev (Gi* p &lt; 0.05 and positive Gi* z-score) versus all other tracts, then compare nearest_hw_dist_m and hw_count_5km distributions between groups using Mann\u2013Whitney U tests.</p><p><b>Expected Output:</b> Group medians and Mann\u2013Whitney U test statistics and p-values for nearest_hw_dist_m and hw_count_5km comparing hotspots vs non-hotspots.</p>", "o1_s9_out": "<h3>Output Data</h3><p><b>Name:</b> hotspot_proximity_comparison.json</p><p><b>Description:</b> Group medians and Mann\u2013Whitney U test statistics and p-values for nearest_hw_dist_m and hw_count_5km comparing hotspots vs non-hotspots.</p>", "o2_s1_i0": "<h3>Input Data</h3><p><b>Name:</b> NC_ACS_data</p>", "o2_s1_op": "<h3>Step 2.1: left_join</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> asthma_proximity.csv, NC_ACS_data</p><p><b>Output:</b> tract_asthma_prox_acs.csv</p><p><b>Description:</b> Left-join NC_ACS_data to asthma_proximity.csv on GEOID and retain GEOID, Asthma_prev, nearest_hw_dist_m, hw_count_5km, ratio_poverty, ratio_uninsured, med_income, ratio_black, and ratio_hispanic.</p><p><b>Expected Output:</b> A GEOID-keyed modeling table containing outcome, exposures, and covariates.</p>", "o2_s1_out": "<h3>Output Data</h3><p><b>Name:</b> tract_asthma_prox_acs.csv</p><p><b>Description:</b> A GEOID-keyed modeling table containing outcome, exposures, and covariates.</p>", "o2_s2_op": "<h3>Step 2.2: filter_rows_complete_cases</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> tract_asthma_prox_acs.csv</p><p><b>Output:</b> tract_modeling_completecases.csv</p><p><b>Description:</b> Filter tract_asthma_prox_acs.csv to rows with non-missing values for Asthma_prev, nearest_hw_dist_m, ratio_poverty, ratio_uninsured, med_income, ratio_black, and ratio_hispanic.</p>", "o2_s2_out": "<h3>Output Data</h3><p><b>Name:</b> tract_modeling_completecases.csv</p>", "o2_s3_op": "<h3>Step 2.3: feature_engineering</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> tract_modeling_completecases.csv</p><p><b>Output:</b> tract_modeling_features.csv</p><p><b>Description:</b> Create ln_nearest_hw_dist_m = ln(nearest_hw_dist_m + 1), create z_ratio_poverty, z_ratio_uninsured, z_med_income, z_ratio_black, and z_ratio_hispanic as z-scores of ratio_poverty, ratio_uninsured, med_income, ratio_black, and ratio_hispanic, and create interaction terms ln_nearest_hw_dist_m_x_z_ratio_poverty = ln_nearest_hw_dist_m * z_ratio_poverty and ln_nearest_hw_dist_m_x_z_ratio_black = ln_nearest_hw_dist_m * z_ratio_black.</p><p><b>Expected Output:</b> A modeling-ready feature table including transformed exposure, standardized covariates, and specified interaction terms.</p>", "o2_s3_out": "<h3>Output Data</h3><p><b>Name:</b> tract_modeling_features.csv</p><p><b>Description:</b> A modeling-ready feature table including transformed exposure, standardized covariates, and specified interaction terms.</p>", "o2_s4_op": "<h3>Step 2.4: ordinary_least_squares_with_interactions</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> tract_modeling_features.csv</p><p><b>Output:</b> ols_interaction_results.json</p><p><b>Description:</b> Fit an ordinary least squares model with dependent variable Asthma_prev and predictors ln_nearest_hw_dist_m, z_ratio_poverty, z_ratio_uninsured, z_med_income, z_ratio_black, z_ratio_hispanic, ln_nearest_hw_dist_m_x_z_ratio_poverty, and ln_nearest_hw_dist_m_x_z_ratio_black, and report heteroskedasticity-robust (HC) standard errors.</p><p><b>Expected Output:</b> OLS coefficient table and model diagnostics including robust standard errors and p-values.</p>", "o2_s4_out": "<h3>Output Data</h3><p><b>Name:</b> ols_interaction_results.json</p><p><b>Description:</b> OLS coefficient table and model diagnostics including robust standard errors and p-values.</p>", "o2_s5_op": "<h3>Step 2.5: attach_coordinates</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> tract_modeling_features.csv, nc_tract_centroids.gpkg</p><p><b>Output:</b> tract_modeling_with_xy.csv</p><p><b>Description:</b> Join centroid coordinates from nc_tract_centroids.gpkg to tract_modeling_features.csv by GEOID and write numeric x and y coordinate columns named x and y.</p>", "o2_s5_out": "<h3>Output Data</h3><p><b>Name:</b> tract_modeling_with_xy.csv</p>", "o2_s6_op": "<h3>Step 2.6: variance_inflation_factors</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> tract_modeling_features.csv</p><p><b>Output:</b> vif_results.json</p><p><b>Description:</b> Compute variance inflation factors (VIF) for each predictor variable in the GWR predictor set (ln_nearest_hw_dist_m, z_ratio_poverty, z_ratio_uninsured, z_med_income, z_ratio_black, z_ratio_hispanic) prior to fitting the geographically weighted regression.</p><p><b>Expected Output:</b> A table of VIF values for each predictor variable to assess multicollinearity prior to GWR.</p>", "o2_s6_out": "<h3>Output Data</h3><p><b>Name:</b> vif_results.json</p><p><b>Description:</b> A table of VIF values for each predictor variable to assess multicollinearity prior to GWR.</p>", "o2_s7_op": "<h3>Step 2.7: geographically_weighted_regression</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> tract_modeling_with_xy.csv</p><p><b>Output:</b> gwr_local_coefficients.gpkg</p><p><b>Description:</b> Fit a geographically weighted regression using an adaptive bandwidth selected by minimizing AICc and a bisquare kernel with dependent variable Asthma_prev and predictors ln_nearest_hw_dist_m, z_ratio_poverty, z_ratio_uninsured, z_med_income, z_ratio_black, and z_ratio_hispanic, and output per-GEOID local coefficients and local R2.</p><p><b>Expected Output:</b> Per-tract local coefficient estimates (including the ln_nearest_hw_dist_m coefficient) and local R2 for assessing spatial non-stationarity.</p>", "o2_s7_out": "<h3>Output Data</h3><p><b>Name:</b> gwr_local_coefficients.gpkg</p><p><b>Description:</b> Per-tract local coefficient estimates (including the ln_nearest_hw_dist_m coefficient) and local R2 for assessing spatial non-stationarity.</p>", "rq_node": "<h3>Research Question</h3><p>How does proximity to hazardous waste facilities influence spatial patterns of asthma prevalence across census tracts of North Carolina, and how do these relationships vary spatially by socioeconomic and demographic context?</p>", "stage_0": "<h3>Result Collation</h3><p>Collate outputs and results from all objectives into a unified dataset for analysis.</p>", "stage_1": "<h3>Results Analysis</h3><p>Perform statistical analysis, validation, and interpretation of the collated results.</p>", "stage_2": "<h3>Discussion of Results</h3><p>Synthesise findings, compare with hypotheses, and discuss implications.</p>", "stage_3": "<h3>Manuscript</h3><p>Final research deliverable: paper, report, or document combining all findings.</p>", "obj_title_1": "<h3>Objective 1</h3><p><b>Title:</b> Assess whether asthma prevalence is spatially clustered across North Carolina census tracts and whether hazardous-waste proximity aligns with high-asthma clusters</p><p><b>Hypothesis:</b> Census tracts with smaller nearest-site distance to hazardous waste facilities and/or larger hazardous-waste facility counts within 5000 meters have higher Asthma_prev and are overrepresented in statistically significant high-asthma clusters.</p><p><b>Steps:</b></p><ol><li><b>reproject_layer</b>: Reproject NC_tract to a common projected CRS in meters suitable for distance calculations while preserving GEOID.</li><li><b>reproject_layer</b>: Reproject NC_HW_sites to the same projected CRS used for nc_tract_projected.gpkg while preserving SITE_NAME.</li><li><b>centroid</b>: Compute tract centroids from nc_tract_projected.gpkg and retain GEOID for each centroid feature.</li><li><b>nearest_neighbor_distance_and_buffer_count</b>: For each GEOID, compute nearest_hw_dist_m as the Euclidean distance in meters from the tract centroid to the nearest hazardous waste facility point and compute hw_count_5km as the count of hazardous waste facility points within 5000 meters of the centroid.</li><li><b>left_join</b>: Left-join tract_proximity_metrics.csv to NC_PLACES on GEOID and retain GEOID, Asthma_prev, nearest_hw_dist_m, and hw_count_5km.</li><li><b>attribute_join</b>: Join asthma_proximity.csv to nc_tract_projected.gpkg by GEOID to create tract polygons with attributes Asthma_prev, nearest_hw_dist_m, and hw_count_5km.</li><li><b>global_morans_I</b>: Compute Global Moran\u2019s I for Asthma_prev using queen contiguity weights defined on tract polygons and permutation-based p-values.</li><li><b>getis_ord_gi_star</b>: Compute Getis-Ord Gi* for Asthma_prev using queen contiguity weights on tract polygons and write Gi* z-scores and p-value-based significance class per GEOID.</li><li><b>mann_whitney_u_test</b>: Using asthma_hotspots.gpkg, subset tracts to statistically significant hotspots for Asthma_prev (Gi* p &lt; 0.05 and positive Gi* z-score) versus all other tracts, then compare nearest_hw_dist_m and hw_count_5km distributions between groups using Mann\u2013Whitney U tests.</li></ol>", "obj_title_2": "<h3>Objective 2</h3><p><b>Title:</b> Estimate how the hazardous-waste proximity\u2013asthma association varies by socioeconomic and demographic context and whether the association is spatially non-stationary</p><p><b>Hypothesis:</b> After adjustment for tract context, the association between hazardous waste proximity and Asthma_prev is stronger in tracts with higher ratio_poverty, higher ratio_uninsured, and higher ratio_black, and the proximity effect varies across space.</p><p><b>Steps:</b></p><ol><li><b>left_join</b>: Left-join NC_ACS_data to asthma_proximity.csv on GEOID and retain GEOID, Asthma_prev, nearest_hw_dist_m, hw_count_5km, ratio_poverty, ratio_uninsured, med_income, ratio_black, and ratio_hispanic.</li><li><b>filter_rows_complete_cases</b>: Filter tract_asthma_prox_acs.csv to rows with non-missing values for Asthma_prev, nearest_hw_dist_m, ratio_poverty, ratio_uninsured, med_income, ratio_black, and ratio_hispanic.</li><li><b>feature_engineering</b>: Create ln_nearest_hw_dist_m = ln(nearest_hw_dist_m + 1), create z_ratio_poverty, z_ratio_uninsured, z_med_income, z_ratio_black, and z_ratio_hispanic as z-scores of ratio_poverty, ratio_uninsured, med_income, ratio_black, and ratio_hispanic, and create interaction terms ln_nearest_hw_dist_m_x_z_ratio_poverty = ln_nearest_hw_dist_m * z_ratio_poverty and ln_nearest_hw_dist_m_x_z_ratio_black = ln_nearest_hw_dist_m * z_ratio_black.</li><li><b>ordinary_least_squares_with_interactions</b>: Fit an ordinary least squares model with dependent variable Asthma_prev and predictors ln_nearest_hw_dist_m, z_ratio_poverty, z_ratio_uninsured, z_med_income, z_ratio_black, z_ratio_hispanic, ln_nearest_hw_dist_m_x_z_ratio_poverty, and ln_nearest_hw_dist_m_x_z_ratio_black, and report heteroskedasticity-robust (HC) standard errors.</li><li><b>attach_coordinates</b>: Join centroid coordinates from nc_tract_centroids.gpkg to tract_modeling_features.csv by GEOID and write numeric x and y coordinate columns named x and y.</li><li><b>variance_inflation_factors</b>: Compute variance inflation factors (VIF) for each predictor variable in the GWR predictor set (ln_nearest_hw_dist_m, z_ratio_poverty, z_ratio_uninsured, z_med_income, z_ratio_black, z_ratio_hispanic) prior to fitting the geographically weighted regression.</li><li><b>geographically_weighted_regression</b>: Fit a geographically weighted regression using an adaptive bandwidth selected by minimizing AICc and a bisquare kernel with dependent variable Asthma_prev and predictors ln_nearest_hw_dist_m, z_ratio_poverty, z_ratio_uninsured, z_med_income, z_ratio_black, and z_ratio_hispanic, and output per-GEOID local coefficients and local R2.</li></ol>"};
const nodeNames = {"o1_s1_i0": "NC_tract", "o1_s1_op": "reproject_layer", "o1_s1_out": "nc_tract_projected.gpkg", "o1_s2_i0": "NC_HW_sites", "o1_s2_op": "reproject_layer", "o1_s2_out": "nc_hw_sites_projected.gpkg", "o1_s3_op": "centroid", "o1_s3_out": "nc_tract_centroids.gpkg", "o1_s4_op": "nearest_neighbor_distance_and_buffer_count", "o1_s4_out": "tract_proximity_metrics.csv", "o1_s5_i0": "NC_PLACES", "o1_s5_op": "left_join", "o1_s5_out": "asthma_proximity.csv", "o1_s6_op": "attribute_join", "o1_s6_out": "tract_asthma_proximity.gpkg", "o1_s7_op": "global_morans_I", "o1_s7_out": "global_moransI_asthma.json", "o1_s8_op": "getis_ord_gi_star", "o1_s8_out": "asthma_hotspots.gpkg", "o1_s9_op": "mann_whitney_u_test", "o1_s9_out": "hotspot_proximity_comparison.json", "o2_s1_i0": "NC_ACS_data", "o2_s1_op": "left_join", "o2_s1_out": "tract_asthma_prox_acs.csv", "o2_s2_op": "filter_rows_complete_cases", "o2_s2_out": "tract_modeling_completecases.csv", "o2_s3_op": "feature_engineering", "o2_s3_out": "tract_modeling_features.csv", "o2_s4_op": "ordinary_least_squares_with_interactions", "o2_s4_out": "ols_interaction_results.json", "o2_s5_op": "attach_coordinates", "o2_s5_out": "tract_modeling_with_xy.csv", "o2_s6_op": "variance_inflation_factors", "o2_s6_out": "vif_results.json", "o2_s7_op": "geographically_weighted_regression", "o2_s7_out": "gwr_local_coefficients.gpkg", "rq_node": "How does proximity to hazardous waste facilities influence spatial patterns of asthma prevalence across census tracts of North Carolina, and how do these relationships vary spatially by socioeconomic and demographic context?", "stage_0": "Result Collation", "stage_1": "Results Analysis", "stage_2": "Discussion of Results", "stage_3": "Manuscript", "obj_title_1": "Assess whether asthma prevalence is spatially clustered across North Carolina census tracts and whether hazardous-waste proximity aligns with high-asthma clusters", "obj_title_2": "Estimate how the hazardous-waste proximity\u2013asthma association varies by socioeconomic and demographic context and whether the association is spatially non-stationary"};

let scale=1, panX=0, panY=0, isPanning=false, _wasDragged=false, psX=0, psY=0, _mdX=0, _mdY=0;
const PT=4;
const MN=0.2, MX=5, ZS=0.15;
const svg=document.getElementById('flowchartSvg');
const zg=document.getElementById('zoomGroup');
const gp=document.getElementById('graphPanel');
const tooltip=document.getElementById('nodeTooltip');

function applyTransform(){
  zg.setAttribute('transform','translate('+panX+','+panY+') scale('+scale+')');
  document.getElementById('zoomLevel').textContent=Math.round(scale*100)+'%';
}
function zoomIn(){ scale=Math.min(MX,scale+ZS); applyTransform(); }
function zoomOut(){ scale=Math.max(MN,scale-ZS); applyTransform(); }
function zoomReset(){ scale=1;panX=0;panY=0;applyTransform(); }
function zoomFit(){
  var b=zg.getBBox(),v=svg.viewBox.baseVal,p=30;
  scale=Math.min((v.width-p*2)/b.width,(v.height-p*2)/b.height,MX);
  panX=(v.width/scale-b.width)/2-b.x+p/scale;
  panY=(v.height/scale-b.height)/2-b.y+p/scale;
  applyTransform();
}

gp.addEventListener('wheel',function(e){
  e.preventDefault();
  var r=svg.getBoundingClientRect(),v=svg.viewBox.baseVal;
  var sx=((e.clientX-r.left)/r.width)*v.width, sy=((e.clientY-r.top)/r.height)*v.height;
  var os=scale;
  scale=e.deltaY<0?Math.min(MX,scale+ZS):Math.max(MN,scale-ZS);
  panX=sx/scale-sx/os+panX; panY=sy/scale-sy/os+panY; applyTransform();
},{passive:false});

gp.addEventListener('mousedown',function(e){
  if(e.button===0||e.button===1){
    e.preventDefault();isPanning=true;_wasDragged=false;
    psX=e.clientX;psY=e.clientY;_mdX=e.clientX;_mdY=e.clientY;
    gp.style.cursor='grabbing';
  }
});
window.addEventListener('mousemove',function(e){
  if(!isPanning)return;
  var dist=Math.abs(e.clientX-_mdX)+Math.abs(e.clientY-_mdY);
  if(dist>PT)_wasDragged=true;
  var v=svg.viewBox.baseVal,r=svg.getBoundingClientRect();
  panX+=(e.clientX-psX)*(v.width/r.width)/scale;
  panY+=(e.clientY-psY)*(v.height/r.height)/scale;
  psX=e.clientX;psY=e.clientY;applyTransform();
});
window.addEventListener('mouseup',function(){ if(isPanning){isPanning=false;gp.style.cursor='';} });
gp.addEventListener('click',function(e){ if(_wasDragged){e.stopPropagation();_wasDragged=false;} },true);

// ── Hover highlight: direct connections only ──
function getConnected(nid){
  var edges=document.querySelectorAll('.edge-line');
  var visited={};
  var connEdges=[];
  visited[nid]=true;
  edges.forEach(function(e){
    var f=e.getAttribute('data-from'), t=e.getAttribute('data-to');
    if(f===nid){ connEdges.push(e); visited[t]=true; }
    if(t===nid){ connEdges.push(e); visited[f]=true; }
  });
  return {nodes:visited, edges:connEdges};
}

function hlNode(nid){
  var conn=getConnected(nid);
  // Highlight connected edges
  document.querySelectorAll('.edge-line').forEach(function(e){
    if(conn.edges.indexOf(e)>=0) e.classList.add('highlighted');
  });
  // Dim unconnected nodes
  document.querySelectorAll('.node-box').forEach(function(g){
    var id=g.getAttribute('data-nid');
    if(id && !conn.nodes[id]) g.classList.add('dimmed');
  });
  // Tooltip
  var name=nodeNames[nid]||'';
  if(name){
    tooltip.textContent=name;
    tooltip.style.display='block';
  }
}

function ulNode(){
  document.querySelectorAll('.edge-line.highlighted').forEach(function(e){ e.classList.remove('highlighted'); });
  document.querySelectorAll('.node-box.dimmed').forEach(function(g){ g.classList.remove('dimmed'); });
  tooltip.style.display='none';
}

// Position tooltip near cursor
document.addEventListener('mousemove',function(e){
  if(tooltip.style.display==='block'){
    tooltip.style.left=(e.clientX+12)+'px';
    tooltip.style.top=(e.clientY-28)+'px';
  }
});

function showPopup(nodeId){
  var c=document.getElementById('popupContent');
  var o=document.getElementById('popupOverlay');
  c.innerHTML=details[nodeId]||'<p style="color:#999">No details.</p>';
  o.classList.add('visible');
  document.querySelectorAll('.node-box ellipse,.node-box rect').forEach(function(el){
    el.setAttribute('stroke',el.getAttribute('data-os')||'#333');
    el.setAttribute('stroke-width',el.tagName==='rect'?'2':'1.5');
  });
  var cl=event.currentTarget.querySelector('ellipse,rect');
  if(cl){ cl.setAttribute('stroke-width','3.5'); cl.setAttribute('stroke','#FFD700'); }
}
function closePopup(e){
  if(e&&e.target!==document.getElementById('popupOverlay'))return;
  document.getElementById('popupOverlay').classList.remove('visible');
  document.querySelectorAll('.node-box ellipse,.node-box rect').forEach(function(el){
    el.setAttribute('stroke',el.getAttribute('data-os')||'#333');
    el.setAttribute('stroke-width',el.tagName==='rect'?'2':'1.5');
  });
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape')closePopup(); });
window.addEventListener('DOMContentLoaded',function(){ setTimeout(zoomFit,100); });
</script>
</body>
</html>
