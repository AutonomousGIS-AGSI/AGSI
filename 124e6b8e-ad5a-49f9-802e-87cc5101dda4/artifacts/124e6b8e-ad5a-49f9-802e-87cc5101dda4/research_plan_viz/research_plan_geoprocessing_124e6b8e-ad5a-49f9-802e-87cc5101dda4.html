<script>
const details = {"o1_s1_i0": "<h3>Input Data</h3><p><b>Name:</b> SC_ACS_data</p>", "o1_s1_i1": "<h3>Input Data</h3><p><b>Name:</b> SC_PLACES_depression</p>", "o1_s1_op": "<h3>Step 1.1: Validate join keys and required fields</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> SC_ACS_data, SC_PLACES_depression</p><p><b>Output:</b> acs_places_validated.csv</p><p><b>Description:</b> Coerce GEOID to string in SC_ACS_data and SC_PLACES_depression; retain only GEOID, Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, percent_Black, percent_Hispanic, percent_&gt;=18, and Depression_prev; drop rows with missing GEOID and report counts of missing values in Depression_prev and each ACS field.</p>", "o1_s1_out": "<h3>Output Data</h3><p><b>Name:</b> acs_places_validated.csv</p>", "o1_s2_op": "<h3>Step 1.2: Left join on GEOID</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> acs_places_validated.csv</p><p><b>Output:</b> county_ses_depression.csv</p><p><b>Description:</b> Left-join Depression_prev from SC_PLACES_depression to SC_ACS_data on GEOID, keeping GEOID, Depression_prev, Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, percent_Black, percent_Hispanic, and percent_&gt;=18.</p><p><b>Expected Output:</b> A county-level table keyed by GEOID containing Depression_prev and SES/covariate fields.</p>", "o1_s2_out": "<h3>Output Data</h3><p><b>Name:</b> county_ses_depression.csv</p><p><b>Description:</b> A county-level table keyed by GEOID containing Depression_prev and SES/covariate fields.</p>", "o1_s3_op": "<h3>Step 1.3: Create composite SES index via z-score standardization</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> county_ses_depression.csv</p><p><b>Output:</b> county_ses_depression_with_index.csv</p><p><b>Description:</b> Compute SES_index as the mean of z-scored Med_income and percent_&gt;=HighSch and the negated z-scores of percent_Poverty, percent_Unemployed, and percent_Uninsured; append SES_index to the table.</p><p><b>Expected Output:</b> A county table with SES_index (higher values indicate higher socioeconomic status).</p>", "o1_s3_out": "<h3>Output Data</h3><p><b>Name:</b> county_ses_depression_with_index.csv</p><p><b>Description:</b> A county table with SES_index (higher values indicate higher socioeconomic status).</p>", "o1_s4_op": "<h3>Step 1.4: Ordinary least squares (OLS) with heteroskedasticity-robust standard errors</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_ses_depression_with_index.csv</p><p><b>Output:</b> ols_ses_to_depression_results.csv</p><p><b>Description:</b> Fit OLS model Depression_prev ~ SES_index + percent_&gt;=18 + percent_Black + percent_Hispanic and compute HC1 robust standard errors; save coefficient estimates, robust standard errors, t-statistics, p-values, R-squared, and residual diagnostics.</p><p><b>Expected Output:</b> A results table quantifying the county-level association between SES_index and Depression_prev with covariate adjustment.</p>", "o1_s4_out": "<h3>Output Data</h3><p><b>Name:</b> ols_ses_to_depression_results.csv</p><p><b>Description:</b> A results table quantifying the county-level association between SES_index and Depression_prev with covariate adjustment.</p>", "o1_s5_i0": "<h3>Input Data</h3><p><b>Name:</b> SC_counties</p>", "o1_s5_op": "<h3>Step 1.5: Attribute join (tabular-to-geometry)</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> SC_counties, county_ses_depression_with_index.csv</p><p><b>Output:</b> counties_ses_depression.gpkg</p><p><b>Description:</b> Join county_ses_depression_with_index.csv to SC_counties on GEOID to create a polygon layer with GEOID, Depression_prev, SES_index, Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, percent_Black, percent_Hispanic, and percent_&gt;=18.</p><p><b>Expected Output:</b> A county polygon layer for choropleth mapping of Depression_prev and SES_index.</p>", "o1_s5_out": "<h3>Output Data</h3><p><b>Name:</b> counties_ses_depression.gpkg</p><p><b>Description:</b> A county polygon layer for choropleth mapping of Depression_prev and SES_index.</p>", "o2_s1_i0": "<h3>Input Data</h3><p><b>Name:</b> SC_Visitor_POI</p>", "o2_s1_op": "<h3>Step 2.1: Left join on GEOID</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> county_ses_depression_with_index.csv, SC_Visitor_POI</p><p><b>Output:</b> county_ses_depression_visits.csv</p><p><b>Description:</b> Left-join SC_Visitor_POI to county_ses_depression_with_index.csv on GEOID, retaining GEOID, Depression_prev, Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, percent_&gt;=18, percent_Black, percent_Hispanic, and visitation count columns Full_Service_Restaurant, Sport_facilities, Parks, Fastfood_Restaurant, Convenience, Supermarket, Warehouse, Fruit, TobaccoStore, and DrinkingPlaces.</p><p><b>Expected Output:</b> A county-level table combining socioeconomic/depression variables with POI visitation counts.</p>", "o2_s1_out": "<h3>Output Data</h3><p><b>Name:</b> county_ses_depression_visits.csv</p><p><b>Description:</b> A county-level table combining socioeconomic/depression variables with POI visitation counts.</p>", "o2_s2_op": "<h3>Step 2.2: Compute total_visits and share_* composition with zero-safe rules</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> county_ses_depression_visits.csv</p><p><b>Output:</b> county_visitation_shares.csv</p><p><b>Description:</b> Compute total_visits as the row-wise sum of Full_Service_Restaurant + Sport_facilities + Parks + Fastfood_Restaurant + Convenience + Supermarket + Warehouse + Fruit + TobaccoStore + DrinkingPlaces; for counties where total_visits &gt; 0 compute share_Full_Service_Restaurant, share_Sport_facilities, share_Parks, share_Fastfood_Restaurant, share_Convenience, share_Supermarket, share_Warehouse, share_Fruit, share_TobaccoStore, and share_DrinkingPlaces as category/total_visits; set all share_* to 0 where total_visits == 0.</p><p><b>Expected Output:</b> A county table with total_visits and normalized visitation composition (share_*) variables.</p>", "o2_s2_out": "<h3>Output Data</h3><p><b>Name:</b> county_visitation_shares.csv</p><p><b>Description:</b> A county table with total_visits and normalized visitation composition (share_*) variables.</p>", "o2_s3_op": "<h3>Step 2.3: Shannon entropy (mobility diversity)</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_visitation_shares.csv</p><p><b>Output:</b> county_mobility_diversity.csv</p><p><b>Description:</b> Compute mobility_diversity as Shannon entropy across the 10 share_* columns (share_Full_Service_Restaurant, share_Sport_facilities, share_Parks, share_Fastfood_Restaurant, share_Convenience, share_Supermarket, share_Warehouse, share_Fruit, share_TobaccoStore, share_DrinkingPlaces) using the convention 0 * log(0) = 0; append mobility_diversity.</p><p><b>Expected Output:</b> A county table with mobility_diversity summarizing evenness of visitation composition.</p>", "o2_s3_out": "<h3>Output Data</h3><p><b>Name:</b> county_mobility_diversity.csv</p><p><b>Description:</b> A county table with mobility_diversity summarizing evenness of visitation composition.</p>", "o2_s4_op": "<h3>Step 2.4: Principal component analysis (PCA) on visitation composition</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_mobility_diversity.csv</p><p><b>Output:</b> county_mobility_pca.csv</p><p><b>Description:</b> Standardize the 10 share_* variables to zero mean and unit variance and run PCA; append mobility_PC1 (first principal component score) and mobility_PC2 (second principal component score) to each county.</p><p><b>Expected Output:</b> A county table with mobility_PC1 and mobility_PC2 summarizing dominant gradients in visitation composition.</p>", "o2_s4_out": "<h3>Output Data</h3><p><b>Name:</b> county_mobility_pca.csv</p><p><b>Description:</b> A county table with mobility_PC1 and mobility_PC2 summarizing dominant gradients in visitation composition.</p>", "o2_s5_op": "<h3>Step 2.5: Ordinary least squares (OLS) with heteroskedasticity-robust standard errors</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_mobility_pca.csv</p><p><b>Output:</b> ols_ses_to_mobility_results.csv</p><p><b>Description:</b> Fit OLS models (with HC1 robust standard errors): mobility_PC1 ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + percent_&gt;=18 + percent_Black + percent_Hispanic and mobility_diversity ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + percent_&gt;=18 + percent_Black + percent_Hispanic; save coefficient estimates, robust standard errors, t-statistics, p-values, and R-squared for both models.</p><p><b>Expected Output:</b> Model results quantifying how Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, and percent_&gt;=HighSch relate to mobility_PC1 and mobility_diversity.</p>", "o2_s5_out": "<h3>Output Data</h3><p><b>Name:</b> ols_ses_to_mobility_results.csv</p><p><b>Description:</b> Model results quantifying how Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, and percent_&gt;=HighSch relate to mobility_PC1 and mobility_diversity.</p>", "o3_s1_op": "<h3>Step 3.1: Linear mediator model (OLS) with heteroskedasticity-robust standard errors</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_mobility_pca.csv</p><p><b>Output:</b> mediator_model_results.csv</p><p><b>Description:</b> Fit the mediator model mobility_PC1 ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + percent_&gt;=18 + percent_Black + percent_Hispanic using OLS with HC1 robust standard errors; save coefficients and fitted values per GEOID.</p><p><b>Expected Output:</b> Mediator-model coefficients and fitted mobility_PC1 values per county.</p>", "o3_s1_out": "<h3>Output Data</h3><p><b>Name:</b> mediator_model_results.csv</p><p><b>Description:</b> Mediator-model coefficients and fitted mobility_PC1 values per county.</p>", "o3_s2_op": "<h3>Step 3.2: Linear outcome model (OLS) with heteroskedasticity-robust standard errors</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_mobility_pca.csv</p><p><b>Output:</b> outcome_model_results.csv</p><p><b>Description:</b> Fit the outcome model Depression_prev ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + mobility_PC1 + percent_&gt;=18 + percent_Black + percent_Hispanic using OLS with HC1 robust standard errors; save coefficients and residuals per GEOID.</p><p><b>Expected Output:</b> Outcome-model coefficients and county-level residuals for spatial diagnostics.</p>", "o3_s2_out": "<h3>Output Data</h3><p><b>Name:</b> outcome_model_results.csv</p><p><b>Description:</b> Outcome-model coefficients and county-level residuals for spatial diagnostics.</p>", "o3_s3_op": "<h3>Step 3.3: Nonparametric bootstrap mediation (ACME/ADE/total effect)</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_mobility_pca.csv</p><p><b>Output:</b> mediation_effects_bootstrap.csv</p><p><b>Description:</b> Estimate mediation of each socioeconomic variable (Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch) \u2192 Depression_prev through mobility_PC1 using nonparametric bootstrap resampling of counties: for each bootstrap sample, refit the mediator model mobility_PC1 ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + percent_&gt;=18 + percent_Black + percent_Hispanic and the outcome model Depression_prev ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + mobility_PC1 + percent_&gt;=18 + percent_Black + percent_Hispanic; compute ACME, ADE, and total effect for each socioeconomic variable (with the remaining socioeconomic variables included as covariates) with percentile bootstrap confidence intervals.</p><p><b>Expected Output:</b> Bootstrap mediation effects (ACME, ADE, total effect) with confidence intervals.</p>", "o3_s3_out": "<h3>Output Data</h3><p><b>Name:</b> mediation_effects_bootstrap.csv</p><p><b>Description:</b> Bootstrap mediation effects (ACME, ADE, total effect) with confidence intervals.</p>", "o3_s4_op": "<h3>Step 3.4: Construct Queen contiguity spatial weights</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> SC_counties</p><p><b>Output:</b> sc_county_queen_weights.csv</p><p><b>Description:</b> Create a Queen contiguity adjacency/weights table from SC_counties polygons keyed by GEOID, storing each GEOID\u2013neighbor_GEOID pair and an associated weight (row-standardized).</p><p><b>Expected Output:</b> A Queen contiguity weights table keyed by GEOID for spatial autocorrelation tests and spatial regression.</p>", "o3_s4_out": "<h3>Output Data</h3><p><b>Name:</b> sc_county_queen_weights.csv</p><p><b>Description:</b> A Queen contiguity weights table keyed by GEOID for spatial autocorrelation tests and spatial regression.</p>", "o3_s5_op": "<h3>Step 3.5: Align spatial weights to the modeling GEOID index</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> sc_county_queen_weights.csv, outcome_model_results.csv</p><p><b>Output:</b> sc_county_queen_weights_aligned.csv</p><p><b>Description:</b> Subset and reorder sc_county_queen_weights.csv to include only GEOIDs present in outcome_model_results.csv and to match the GEOID ordering used for the residual vector; output the aligned weights table.</p>", "o3_s5_out": "<h3>Output Data</h3><p><b>Name:</b> sc_county_queen_weights_aligned.csv</p>", "o3_s6_op": "<h3>Step 3.6: Moran&#x27;s I on outcome-model residuals</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> outcome_model_results.csv, sc_county_queen_weights_aligned.csv</p><p><b>Output:</b> morans_i_outcome_residuals.csv</p><p><b>Description:</b> Compute global Moran\u2019s I for the Depression_prev model residuals using the aligned Queen contiguity weights; report Moran\u2019s I, expectation, variance, z-score, and permutation p-value.</p><p><b>Expected Output:</b> A table containing Moran\u2019s I statistic and significance test for spatial autocorrelation in outcome-model residuals.</p>", "o3_s6_out": "<h3>Output Data</h3><p><b>Name:</b> morans_i_outcome_residuals.csv</p><p><b>Description:</b> A table containing Moran\u2019s I statistic and significance test for spatial autocorrelation in outcome-model residuals.</p>", "o3_s7_op": "<h3>Step 3.7: Spatial error model (SEM)</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_mobility_pca.csv, sc_county_queen_weights_aligned.csv</p><p><b>Output:</b> spatial_error_model_results.csv</p><p><b>Description:</b> Fit a spatial error model for Depression_prev with predictors Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, mobility_PC1, percent_&gt;=18, percent_Black, and percent_Hispanic using the aligned Queen contiguity weights; save regression coefficients, the spatial error parameter (lambda), standard errors, and model fit statistics.</p><p><b>Expected Output:</b> Spatial error model results to compare against OLS and assess sensitivity to spatial dependence.</p>", "o3_s7_out": "<h3>Output Data</h3><p><b>Name:</b> spatial_error_model_results.csv</p><p><b>Description:</b> Spatial error model results to compare against OLS and assess sensitivity to spatial dependence.</p>", "o3_s8_op": "<h3>Step 3.8: Geographically weighted regression (GWR)</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> county_mobility_pca.csv, SC_counties</p><p><b>Output:</b> gwr_model_results.csv</p><p><b>Description:</b> Fit a geographically weighted regression (GWR) for Depression_prev with predictors Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, mobility_PC1, percent_&gt;=18, percent_Black, and percent_Hispanic using county centroids derived from SC_counties (joined by GEOID); select bandwidth via cross-validation or AICc; save local coefficient estimates (including intercept) per GEOID, bandwidth choice, model fit diagnostics, and summaries of spatial variability in coefficients.</p><p><b>Expected Output:</b> GWR results characterizing spatial nonstationarity in socioeconomic and mobility associations with Depression_prev.</p>", "o3_s8_out": "<h3>Output Data</h3><p><b>Name:</b> gwr_model_results.csv</p><p><b>Description:</b> GWR results characterizing spatial nonstationarity in socioeconomic and mobility associations with Depression_prev.</p>", "rq_node": "<h3>Research Question</h3><p>How do spatial patterns of mobility (place visitation) mediate the relationship between neighborhood social economic status and depression prevalence across the counties of South Carolina?</p>", "stage_0": "<h3>Result Collation</h3><p>Collate outputs and results from all objectives into a unified dataset for analysis.</p>", "stage_1": "<h3>Results Analysis</h3><p>Perform statistical analysis, validation, and interpretation of the collated results.</p>", "stage_2": "<h3>Discussion of Results</h3><p>Synthesise findings, compare with hypotheses, and discuss implications.</p>", "stage_3": "<h3>Manuscript</h3><p>Final research deliverable: paper, report, or document combining all findings.</p>", "obj_title_1": "<h3>Objective 1</h3><p><b>Title:</b> Estimate the county-level association between socioeconomic status and depression prevalence across South Carolina</p><p><b>Hypothesis:</b> Counties with lower socioeconomic status (lower Med_income and percent_&gt;=HighSch; higher percent_Poverty, percent_Unemployed, and percent_Uninsured) have higher Depression_prev.</p><p><b>Steps:</b></p><ol><li><b>Validate join keys and required fields</b>: Coerce GEOID to string in SC_ACS_data and SC_PLACES_depression; retain only GEOID, Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, percent_Black, percent_Hispanic, percent_&gt;=18, and Depression_prev; drop rows with missing GEOID and report counts of missing values in Depression_prev and each ACS field.</li><li><b>Left join on GEOID</b>: Left-join Depression_prev from SC_PLACES_depression to SC_ACS_data on GEOID, keeping GEOID, Depression_prev, Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, percent_Black, percent_Hispanic, and percent_&gt;=18.</li><li><b>Create composite SES index via z-score standardization</b>: Compute SES_index as the mean of z-scored Med_income and percent_&gt;=HighSch and the negated z-scores of percent_Poverty, percent_Unemployed, and percent_Uninsured; append SES_index to the table.</li><li><b>Ordinary least squares (OLS) with heteroskedasticity-robust standard errors</b>: Fit OLS model Depression_prev ~ SES_index + percent_&gt;=18 + percent_Black + percent_Hispanic and compute HC1 robust standard errors; save coefficient estimates, robust standard errors, t-statistics, p-values, R-squared, and residual diagnostics.</li><li><b>Attribute join (tabular-to-geometry)</b>: Join county_ses_depression_with_index.csv to SC_counties on GEOID to create a polygon layer with GEOID, Depression_prev, SES_index, Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, percent_Black, percent_Hispanic, and percent_&gt;=18.</li></ol>", "obj_title_2": "<h3>Objective 2</h3><p><b>Title:</b> Quantify how county place-visitation composition varies with socioeconomic status across South Carolina</p><p><b>Hypothesis:</b> Counties with lower Med_income and percent_&gt;=HighSch and higher percent_Poverty, percent_Unemployed, and percent_Uninsured have systematically different visitation composition (category shares) and lower mobility_diversity (Shannon entropy) across POI categories.</p><p><b>Steps:</b></p><ol><li><b>Left join on GEOID</b>: Left-join SC_Visitor_POI to county_ses_depression_with_index.csv on GEOID, retaining GEOID, Depression_prev, Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, percent_&gt;=18, percent_Black, percent_Hispanic, and visitation count columns Full_Service_Restaurant, Sport_facilities, Parks, Fastfood_Restaurant, Convenience, Supermarket, Warehouse, Fruit, TobaccoStore, and DrinkingPlaces.</li><li><b>Compute total_visits and share_* composition with zero-safe rules</b>: Compute total_visits as the row-wise sum of Full_Service_Restaurant + Sport_facilities + Parks + Fastfood_Restaurant + Convenience + Supermarket + Warehouse + Fruit + TobaccoStore + DrinkingPlaces; for counties where total_visits &gt; 0 compute share_Full_Service_Restaurant, share_Sport_facilities, share_Parks, share_Fastfood_Restaurant, share_Convenience, share_Supermarket, share_Warehouse, share_Fruit, share_TobaccoStore, and share_DrinkingPlaces as category/total_visits; set all share_* to 0 where total_visits == 0.</li><li><b>Shannon entropy (mobility diversity)</b>: Compute mobility_diversity as Shannon entropy across the 10 share_* columns (share_Full_Service_Restaurant, share_Sport_facilities, share_Parks, share_Fastfood_Restaurant, share_Convenience, share_Supermarket, share_Warehouse, share_Fruit, share_TobaccoStore, share_DrinkingPlaces) using the convention 0 * log(0) = 0; append mobility_diversity.</li><li><b>Principal component analysis (PCA) on visitation composition</b>: Standardize the 10 share_* variables to zero mean and unit variance and run PCA; append mobility_PC1 (first principal component score) and mobility_PC2 (second principal component score) to each county.</li><li><b>Ordinary least squares (OLS) with heteroskedasticity-robust standard errors</b>: Fit OLS models (with HC1 robust standard errors): mobility_PC1 ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + percent_&gt;=18 + percent_Black + percent_Hispanic and mobility_diversity ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + percent_&gt;=18 + percent_Black + percent_Hispanic; save coefficient estimates, robust standard errors, t-statistics, p-values, and R-squared for both models.</li></ol>", "obj_title_3": "<h3>Objective 3</h3><p><b>Title:</b> Test whether county mobility composition mediates the socioeconomic status\u2013depression association and evaluate spatial dependence</p><p><b>Hypothesis:</b> mobility_PC1 and/or mobility_diversity transmit indirect effects from Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, and/or percent_&gt;=HighSch to Depression_prev, and accounting for spatial dependence changes inference on socioeconomic and mobility effects.</p><p><b>Steps:</b></p><ol><li><b>Linear mediator model (OLS) with heteroskedasticity-robust standard errors</b>: Fit the mediator model mobility_PC1 ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + percent_&gt;=18 + percent_Black + percent_Hispanic using OLS with HC1 robust standard errors; save coefficients and fitted values per GEOID.</li><li><b>Linear outcome model (OLS) with heteroskedasticity-robust standard errors</b>: Fit the outcome model Depression_prev ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + mobility_PC1 + percent_&gt;=18 + percent_Black + percent_Hispanic using OLS with HC1 robust standard errors; save coefficients and residuals per GEOID.</li><li><b>Nonparametric bootstrap mediation (ACME/ADE/total effect)</b>: Estimate mediation of each socioeconomic variable (Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch) \u2192 Depression_prev through mobility_PC1 using nonparametric bootstrap resampling of counties: for each bootstrap sample, refit the mediator model mobility_PC1 ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + percent_&gt;=18 + percent_Black + percent_Hispanic and the outcome model Depression_prev ~ Med_income + percent_Poverty + percent_Unemployed + percent_Uninsured + percent_&gt;=HighSch + mobility_PC1 + percent_&gt;=18 + percent_Black + percent_Hispanic; compute ACME, ADE, and total effect for each socioeconomic variable (with the remaining socioeconomic variables included as covariates) with percentile bootstrap confidence intervals.</li><li><b>Construct Queen contiguity spatial weights</b>: Create a Queen contiguity adjacency/weights table from SC_counties polygons keyed by GEOID, storing each GEOID\u2013neighbor_GEOID pair and an associated weight (row-standardized).</li><li><b>Align spatial weights to the modeling GEOID index</b>: Subset and reorder sc_county_queen_weights.csv to include only GEOIDs present in outcome_model_results.csv and to match the GEOID ordering used for the residual vector; output the aligned weights table.</li><li><b>Moran&#x27;s I on outcome-model residuals</b>: Compute global Moran\u2019s I for the Depression_prev model residuals using the aligned Queen contiguity weights; report Moran\u2019s I, expectation, variance, z-score, and permutation p-value.</li><li><b>Spatial error model (SEM)</b>: Fit a spatial error model for Depression_prev with predictors Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, mobility_PC1, percent_&gt;=18, percent_Black, and percent_Hispanic using the aligned Queen contiguity weights; save regression coefficients, the spatial error parameter (lambda), standard errors, and model fit statistics.</li><li><b>Geographically weighted regression (GWR)</b>: Fit a geographically weighted regression (GWR) for Depression_prev with predictors Med_income, percent_Poverty, percent_Unemployed, percent_Uninsured, percent_&gt;=HighSch, mobility_PC1, percent_&gt;=18, percent_Black, and percent_Hispanic using county centroids derived from SC_counties (joined by GEOID); select bandwidth via cross-validation or AICc; save local coefficient estimates (including intercept) per GEOID, bandwidth choice, model fit diagnostics, and summaries of spatial variability in coefficients.</li></ol>"};

rror_model_results.csv", "o3_s8_op": "Geographically weighted regression (GWR)", "o3_s8_out": "gwr_model_results.csv", "rq_node": "How do spatial patterns of mobility (place visitation) mediate the relationship between neighborhood social economic status and depression prevalence across the counties of South Carolina?", "stage_0": "Result Collation", "stage_1": "Results Analysis", "stage_2": "Discussion of Results", "stage_3": "Manuscript", "obj_title_1": "Estimate the county-level association between socioeconomic status and depression prevalence across South Carolina", "obj_title_2": "Quantify how county place-visitation composition varies with socioeconomic status across South Carolina", "obj_title_3": "Test whether county mobility composition mediates the socioeconomic status\u2013depression association and evaluate spatial dependence"};

let scale=1, panX=0, panY=0, isPanning=false, _wasDragged=false, psX=0, psY=0, _mdX=0, _mdY=0;
const PT=4;
const MN=0.2, MX=5, ZS=0.15;
const svg=document.getElementById('flowchartSvg');
const zg=document.getElementById('zoomGroup');
const gp=document.getElementById('graphPanel');
const tooltip=document.getElementById('nodeTooltip');

function applyTransform(){
  zg.setAttribute('transform','translate('+panX+','+panY+') scale('+scale+')');
  document.getElementById('zoomLevel').textContent=Math.round(scale*100)+'%';
}
function zoomIn(){ scale=Math.min(MX,scale+ZS); applyTransform(); }
function zoomOut(){ scale=Math.max(MN,scale-ZS); applyTransform(); }
function zoomReset(){ scale=1;panX=0;panY=0;applyTransform(); }
function zoomFit(){
  var b=zg.getBBox(),v=svg.viewBox.baseVal,p=30;
  scale=Math.min((v.width-p*2)/b.width,(v.height-p*2)/b.height,MX);
  panX=(v.width/scale-b.width)/2-b.x+p/scale;
  panY=(v.height/scale-b.height)/2-b.y+p/scale;
  applyTransform();
}

gp.addEventListener('wheel',function(e){
  e.preventDefault();
  var r=svg.getBoundingClientRect(),v=svg.viewBox.baseVal;
  var sx=((e.clientX-r.left)/r.width)*v.width, sy=((e.clientY-r.top)/r.height)*v.height;
  var os=scale;
  scale=e.deltaY<0?Math.min(MX,scale+ZS):Math.max(MN,scale-ZS);
  panX=sx/scale-sx/os+panX; panY=sy/scale-sy/os+panY; applyTransform();
},{passive:false});

gp.addEventListener('mousedown',function(e){
  if(e.button===0||e.button===1){
    e.preventDefault();isPanning=true;_wasDragged=false;
    psX=e.clientX;psY=e.clientY;_mdX=e.clientX;_mdY=e.clientY;
    gp.style.cursor='grabbing';
  }
});
window.addEventListener('mousemove',function(e){
  if(!isPanning)return;
  var dist=Math.abs(e.clientX-_mdX)+Math.abs(e.clientY-_mdY);
  if(dist>PT)_wasDragged=true;
  var v=svg.viewBox.baseVal,r=svg.getBoundingClientRect();
  panX+=(e.clientX-psX)*(v.width/r.width)/scale;
  panY+=(e.clientY-psY)*(v.height/r.height)/scale;
  psX=e.clientX;psY=e.clientY;applyTransform();
});
window.addEventListener('mouseup',function(){ if(isPanning){isPanning=false;gp.style.cursor='';} });
gp.addEventListener('click',function(e){ if(_wasDragged){e.stopPropagation();_wasDragged=false;} },true);

// ── Hover highlight: direct connections only ──
function getConnected(nid){
  var edges=document.querySelectorAll('.edge-line');
  var visited={};
  var connEdges=[];
  visited[nid]=true;
  edges.forEach(function(e){
    var f=e.getAttribute('data-from'), t=e.getAttribute('data-to');
    if(f===nid){ connEdges.push(e); visited[t]=true; }
    if(t===nid){ connEdges.push(e); visited[f]=true; }
  });
  return {nodes:visited, edges:connEdges};
}

function hlNode(nid){
  var conn=getConnected(nid);
  // Highlight connected edges
  document.querySelectorAll('.edge-line').forEach(function(e){
    if(conn.edges.indexOf(e)>=0) e.classList.add('highlighted');
  });
  // Dim unconnected nodes
  document.querySelectorAll('.node-box').forEach(function(g){
    var id=g.getAttribute('data-nid');
    if(id && !conn.nodes[id]) g.classList.add('dimmed');
  });
  // Tooltip
  var name=nodeNames[nid]||'';
  if(name){
    tooltip.textContent=name;
    tooltip.style.display='block';
  }
}

function ulNode(){
  document.querySelectorAll('.edge-line.highlighted').forEach(function(e){ e.classList.remove('highlighted'); });
  document.querySelectorAll('.node-box.dimmed').forEach(function(g){ g.classList.remove('dimmed'); });
  tooltip.style.display='none';
}

// Position tooltip near cursor
document.addEventListener('mousemove',function(e){
  if(tooltip.style.display==='block'){
    tooltip.style.left=(e.clientX+12)+'px';
    tooltip.style.top=(e.clientY-28)+'px';
  }
});

function showPopup(nodeId){
  var c=document.getElementById('popupContent');
  var o=document.getElementById('popupOverlay');
  c.innerHTML=details[nodeId]||'<p style="color:#999">No details.</p>';
  o.classList.add('visible');
  document.querySelectorAll('.node-box ellipse,.node-box rect').forEach(function(el){
    el.setAttribute('stroke',el.getAttribute('data-os')||'#333');
    el.setAttribute('stroke-width',el.tagName==='rect'?'2':'1.5');
  });
  var cl=event.currentTarget.querySelector('ellipse,rect');
  if(cl){ cl.setAttribute('stroke-width','3.5'); cl.setAttribute('stroke','#FFD700'); }
}
function closePopup(e){
  if(e&&e.target!==document.getElementById('popupOverlay'))return;
  document.getElementById('popupOverlay').classList.remove('visible');
  document.querySelectorAll('.node-box ellipse,.node-box rect').forEach(function(el){
    el.setAttribute('stroke',el.getAttribute('data-os')||'#333');
    el.setAttribute('stroke-width',el.tagName==='rect'?'2':'1.5');
  });
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape')closePopup(); });
window.addEventListener('DOMContentLoaded',function(){ setTimeout(zoomFit,100); });
</script>
