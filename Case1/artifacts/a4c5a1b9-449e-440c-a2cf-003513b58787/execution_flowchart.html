ot;nan&quot;, &quot;none&quot;, &quot;null&quot;, &quot;&lt;na&gt;&quot;}\nstate_is_na = state.str.lower().isin(na_tokens)\ncounty_is_na = county.str.lower().isin(na_tokens)\n\ndf[&quot;GEOID&quot;] = pd.NA\nmask = (~state_is_na) &amp; (~county_is_na)\ndf.loc[mask, &quot;GEOID&quot;] = state.loc[mask].str.zfill(2) + county.loc[mask].str.zfill(3)\n\n# ---- Save ----------------------------------------------------------------\nos.makedirs(os.path.dirname(OUTPUT_PATH), exist_ok=True)\ndf.to_csv(OUTPUT_PATH, index=False)</pre></div><div class=\"code-section\"><h4>Created Files</h4><div class=\"files-list\"><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/pm25_2019_with_geoid.csv</span></div></div>", "obj1_s3": "<h3 style=\"border-bottom-color:#4C72B0; display:flex; align-items:center; justify-content:space-between; gap:8px;\"><span style=\"cursor:pointer;\" onclick=\"goToStepCard('exec_obj1_step3')\">OBJECTIVE 1 | Step 3</span><button onclick=\"goToStepCard('exec_obj1_step3')\" style=\"font-size:0.65em; padding:3px 10px; border:1px solid #4a90d9; border-radius:4px; background:#f0f6ff; color:#2a6cb6; cursor:pointer; white-space:nowrap;\">Go to Card</button></h3><div class=\"meta-grid\"><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\"><span class=\"meta-label\">Agent</span><span class=\"meta-value\">DataAgent</span></div><div class=\"meta-item\" style=\"grid-column:span 2\"><span class=\"meta-label\">Description</span><span class=\"meta-value\">Group by `GEOID` and compute `pm25_mean_2019 = mean(arithmetic_mean)` and `pm25_site_count_2019 = count(site_number)`.</span></div></div><div class=\"meta-item\" style=\"margin-bottom:12px\"><span class=\"meta-label\">Code File</span><span class=\"meta-value\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/generated_code/op_groupby_aggregate_mean_and_cou_bd711148.py</span></div><div class=\"code-section\"><h4>Executed Code</h4><pre>import os\nimport numpy as np\nimport pandas as pd\n\nINPUT_PATH = &quot;/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/pm25_2019_with_geoid.csv&quot;\nOUTPUT_PATH = &quot;/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/pm25_county_2019.csv&quot;\nOUTPUT_DIR = &quot;/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787&quot;\n\n# ---- Load ----------------------------------------------------------------\ndf = pd.read_csv(INPUT_PATH, dtype=str)\n\n# ---- Clean/normalize needed fields ---------------------------------------\n# GEOID: strip; zfill to modal width to preserve leading zeros (county GEOID usually width=5)\ndf[&quot;GEOID&quot;] = df[&quot;GEOID&quot;].astype(str).str.strip()\ngeoid_len = df[&quot;GEOID&quot;].dropna().str.len()\nif not geoid_len.empty:\n    key_width = int(geoid_len.mode().iloc[0])\n    df[&quot;GEOID&quot;] = df[&quot;GEOID&quot;].str.zfill(key_width)\n\n# arithmetic_mean: numeric for mean aggregation\ndf[&quot;arithmetic_mean&quot;] = pd.to_numeric(df[&quot;arithmetic_mean&quot;], errors=&quot;coerce&quot;)\n\n# site_number: keep as string; count non-null per GEOID\ndf[&quot;site_number&quot;] = df[&quot;site_number&quot;].astype(str).replace({&quot;nan&quot;: np.nan}).str.strip()\n\n# Drop rows without GEOID (cannot aggregate)\ndf = df.dropna(subset=[&quot;GEOID&quot;])\n\n# ---- Aggregate ------------------------------------------------------------\nout = (\n    df.groupby(&quot;GEOID&quot;, as_index=False)\n    .agg(\n        pm25_mean_2019=(&quot;arithmetic_mean&quot;, &quot;mean&quot;),\n        pm25_site_count_2019=(&quot;site_number&quot;, &quot;count&quot;),\n    )\n)\n\n# ---- Save ----------------------------------------------------------------\nos.makedirs(os.path.dirname(OUTPUT_PATH), exist_ok=True)\nout.to_csv(OUTPUT_PATH, index=False)</pre></div><div class=\"code-section /Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/counties_pm25_2019.gpkg&quot;\nOUTPUT_DIR = &quot;/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787&quot;\n\nos.makedirs(os.path.dirname(OUTPUT_GPKG), exist_ok=True)\nos.makedirs(OUTPUT_DIR, exist_ok=True)\n\n# -----------------------\n# Load\n# -----------------------\ncounties = gpd.read_file(INPUT_COUNTIES)\npm25 = pd.read_csv(INPUT_PM25)\n\n# -----------------------\n# Validate/clean geometry\n# -----------------------\ncounties = counties[counties.geometry.notna()]\ncounties = counties[counties.geometry.is_valid &amp; ~counties.geometry.is_empty].copy()\n\n# -----------------------\n# Prepare join keys\n# -----------------------\nJOIN_KEY = &quot;GEOID&quot;\nKEY_WIDTH = 5  # County GEOID is state(2)+county(3)\n\ncounties[JOIN_KEY] = counties[JOIN_KEY].astype(str).str.strip().str.zfill(KEY_WIDTH)\npm25[JOIN_KEY] = pm25[JOIN_KEY].astype(str).str.strip().str.zfill(KEY_WIDTH)\n\n# Keep only the required right-side columns\npm25_keep = [&quot;GEOID&quot;, &quot;pm25_mean_2019&quot;, &quot;pm25_site_count_2019&quot;]\nmissing_right = [c for c in pm25_keep if c not in pm25.columns]\nif missing_right:\n    raise KeyError(\n        f&quot;Missing required columns in pm25 CSV: {missing_right}. &quot;\n        f&quot;Available columns: {list(pm25.columns)}&quot;\n    )\npm25 = pm25[pm25_keep].copy()\n\n# Coerce PM2.5 fields to numeric (they arrived as object)\npm25[&quot;pm25_mean_2019&quot;] = pd.to_numeric(pm25[&quot;pm25_mean_2019&quot;], errors=&quot;coerce&quot;)\npm25[&quot;pm25_site_count_2019&quot;] = pd.to_numeric(pm25[&quot;pm25_site_count_2019&quot;], errors=&quot;coerce&quot;)\n\n# Replace common sentinel values if present\npm25 = pm25.replace([-666666666, -888888888, -999999999], np.nan)\n\n# Ensure right-side key uniqueness (avoid exploding row counts)\npm25 = pm25.drop_duplicates(subset=[&quot;GEOID&quot;]).copy()\n\n# -----------------------\n# Left join\n# -----------------------\nout = counties.merge(pm25, on=&quot;GEOID&quot;, how=&quot;left&quot;)\n\n# -----------------------\n# Join audit\n# -----------------------\ntotal = len(out)\nmatched = int(out[&quot;pm25_mean_2019&quot;].notna().sum())\nmatch_rate = (matched / total) if total else 0.0\nunmatched = total - matched\n\naudit_lines = [\n    &quot;[JOIN AUDIT] Left join pm25_county_2019 to california_counties_2019 on GEOID&quot;,\n    f&quot;  left rows (counties): {total}&quot;,\n    f&quot;  matched (non-null pm25_mean_2019): {matched}/{total} ({match_rate:.1%})&quot;,\n    f&quot;  unmatched (null pm25_mean_2019): {unmatched}&quot;,\n]\nif match_rate &lt; 0.9:\n    audit_lines.append(&quot;  WARNING: match rate below 90% \u2014 inspect GEOID formatting/coverage.&quot;)\n    audit_lines.append(f&quot;    left GEOID sample: {counties[&#x27;GEOID&#x27;].head(5).tolist()}&quot;)\n    audit_lines.append(f&quot;    right GEOID sample: {pm25[&#x27;GEOID&#x27;].head(5).tolist()}&quot;)\n    audit_lines.append(\n        f&quot;    example unmatched left GEOIDs: {out.loc[out[&#x27;pm25_mean_2019&#x27;].isna(), &#x27;GEOID&#x27;].head(10).tolist()}&quot;\n    )\n\naudit_text = &quot;\\n&quot;.join(audit_lines)\nprint(audit_text)\n\naudit_path = os.path.join(OUTPUT_DIR, &quot;join_audit_pm25_2019_counties.txt&quot;)\nwith open(audit_path, &quot;w&quot;) as f:\n    f.write(audit_text + &quot;\\n&quot;)\n\n# -----------------------\n# Save output\n# -----------------------\nout.to_file(OUTPUT_GPKG, driver=&quot;GPKG&quot;)\n\n# Defer rendering: allow presentation layer to auto-choropleth PM2.5\nrecord_data_to_viz(\n    output_dir=OUTPUT_DIR,\n    file_path=OUTPUT_GPKG,\n    caption=&quot;California county polygons enriched with 2019 county-level PM2.5 mean and monitoring site counts via GEOID left join.&quot;,\n    viz_hint={&quot;type&quot;: &quot;choropleth&quot;, &quot;column&quot;: &quot;pm25_mean_2019&quot;},\n    role=&quot;intermediate&quot;,\n)</pre></div><div class=\"code-section output-section\" .to_dict(orient=&quot;index&quot;)\n\nrecords = []\nfor origin_id, neigh_ids in w.neighbors.items():\n    ox, oy = xy_lookup[origin_id][&quot;x&quot;], xy_lookup[origin_id][&quot;y&quot;]\n    for rank, dest_id in enumerate(neigh_ids, start=1):\n        dx, dy = xy_lookup[dest_id][&quot;x&quot;], xy_lookup[dest_id][&quot;y&quot;]\n        geom = LineString([(ox, oy), (dx, dy)])\n        # KNN is typically binary weights=1; keep explicit column\n        records.append(\n            {\n                &quot;origin_id&quot;: str(origin_id),\n                &quot;dest_id&quot;: str(dest_id),\n                &quot;rank&quot;: int(rank),\n                &quot;weight&quot;: 1.0,\n                &quot;geometry&quot;: geom,\n            }\n        )\n\nedges = gpd.GeoDataFrame(records, geometry=&quot;geometry&quot;, crs=centroids_metric.crs)\n\n# Also save centroids as a nodes layer (in original CRS for interpretability)\ncentroids_out = centroids_metric[[&quot;GEOID&quot;, &quot;geometry&quot;]].copy()\nif centroids_out.crs != source_crs:\n    centroids_out = centroids_out.to_crs(source_crs)\n\nedges_out = edges.copy()\nif edges_out.crs != source_crs:\n    edges_out = edges_out.to_crs(source_crs)\n\n# -----------------------------\n# Save to GeoPackage (multiple layers)\n# -----------------------------\n# Overwrite if exists to ensure clean layers\nif os.path.exists(OUTPUT_PATH):\n    os.remove(OUTPUT_PATH)\n\ncentroids_out.to_file(OUTPUT_PATH, layer=&quot;centroids&quot;, driver=&quot;GPKG&quot;)\nedges_out.to_file(OUTPUT_PATH, layer=&quot;knn_edges_k5&quot;, driver=&quot;GPKG&quot;)\n\n# -----------------------------\n# Record artifact for manuscript pipeline auto-rendering\n# -----------------------------\nrecord_data_to_viz(\n    output_dir=OUTPUT_DIR,\n    file_path=OUTPUT_PATH,\n    caption=&quot;K-nearest-neighbor (k=5) spatial weights for counties, represented as centroid-to-centroid edges keyed by GEOID.&quot;,\n    viz_hint={&quot;type&quot;: &quot;geopackage_ .dropna(subset=[y_col, x_col]).copy()\n\naligned = wgeom_keyed.merge(data, on=&quot;GEOID&quot;, how=&quot;inner&quot;)\naligned = aligned.reset_index(drop=True)\n\nif len(aligned) == 0:\n    raise ValueError(\n        &quot;No rows available after aligning on GEOID and dropping NA for required variables.&quot;\n    )\nif len(aligned) &lt;= 5:\n    raise ValueError(\n        f&quot;Need more than k=5 observations to build KNN weights; got n={len(aligned)}.&quot;\n    )\n\n# -----------------------------\n# Build KNN weights (k=5), keyed by GEOID\n# -----------------------------\n# Use ids to ensure the weights object is keyed by GEOID and matches the aligned order\nids = aligned[&quot;GEOID&quot;].tolist()\nw = KNN.from_dataframe(aligned, k=5, ids=ids)\nw.transform = &quot;r&quot;\n\n# -----------------------------\n# Fit maximum-likelihood Spatial Error Model (SEM)\n# -----------------------------\ny = aligned[[y_col]].values.astype(float)          # (n, 1)\nX = aligned[[x_col]].values.astype(float)          # (n, 1) no intercept; spreg adds it\n\nmodel = ML_Error(\n    y=y,\n    x=X,\n    w=w,\n    name_y=y_col,\n    name_x=[x_col],\n)\n\n# -----------------------------\n# Extract results into a manuscript-ready table\n# -----------------------------\n# Coefficients: betas includes [CONSTANT, x...]\nbetas = np.asarray(model.betas).flatten()\nstd_err = np.asarray(model.std_err).flatten()\n\n# z_stat is list of tuples (z, p) for coefficients only (incl constant)\nz_list = np.asarray([t[0] for t in model.z_stat], dtype=float)\np_list = np.asarray([t[1] for t in model.z_stat], dtype=float)\n\ncoef_vars = [&quot;CONSTANT&quot;, x_col]\ncoef_df = pd.DataFrame(\n    {\n        &quot;variable&quot;: coef_vars,\n        &quot;coef&quot;: betas[: len(coef_vars)],\n        &quot;std_err&quot;: std_err[: len(coef_vars)],\n        &quot;z_value&quot;: z_list[: len(coef_vars)],\n        &quot;p_value&quot;: p_list[: len(coef_vars)],\n    }\n)\n\n# Model-level diagnostics / fit [keep_cols].copy()\ngdf = w_gdf[[key_col, &quot;geometry&quot;]].merge(counties_sub, on=key_col, how=&quot;inner&quot;)\n\n# Coerce numeric fields (Metro2013 is int64 but keep robust coercion)\nfor c in [y_col] + x_cols:\n    gdf[c] = pd.to_numeric(gdf[c], errors=&quot;coerce&quot;)\n\n# Drop rows with missing model inputs\ngdf = gdf.dropna(subset=[y_col] + x_cols).reset_index(drop=True)\n\nif len(gdf) == 0:\n    raise ValueError(f&quot;No rows available after dropping NA in {[y_col] + x_cols}.&quot;)\nif len(gdf) &lt; 10:\n    print(f&quot;[WARN] Only {len(gdf)} observations after cleaning; ML SAR estimates may be unstable.&quot;)\n\n# -----------------------------\n# Build Queen contiguity weights keyed by GEOID\n# -----------------------------\nids = gdf[key_col].tolist()\nw = Queen.from_dataframe(gdf, ids=ids)\n\nif getattr(w, &quot;islands&quot;, None):\n    if len(w.islands) &gt; 0:\n        raise ValueError(\n            f&quot;Queen weights contain islands (no neighbors) for GEOID(s): {w.islands}. &quot;\n            &quot;Spatial lag (ML_Lag) may be invalid/unstable with islands; revise geography/weights.&quot;\n        )\n\nw.transform = &quot;r&quot;  # row-standardize\n\n# -----------------------------\n# Fit maximum-likelihood SAR (spatial lag) model\n# -----------------------------\ny = gdf[[y_col]].to_numpy(dtype=float)        # (n, 1)\nX = gdf[x_cols].to_numpy(dtype=float)         # (n, k) -- no intercept; spreg adds constant\n\nmodel = ML_Lag(\n    y=y,\n    x=X,\n    w=w,\n    name_y=y_col,\n    name_x=x_cols,\n    name_w=&quot;Queen(GEOID)&quot;\n)\n\n# -----------------------------\n# Build coefficient table\n# -----------------------------\n# betas includes: [CONSTANT, x1, x2, x3, rho]\nbetas = np.asarray(model.betas).flatten()\nstd_err = np.asarray(model.std_err).flatten()\n\n# z_stat entries correspond to betas (including rho)\nz_vals = np.array([zp[0] for zp in model.z_stat], dtype=float)\np_vals = np.array([zp[1] for zp in model.z_stat], dtype=float)\n\nvar_names = [&quot;CONSTANT&quot;] + x_cols + [&quot;rho&quot;]\ncoef_df = pd.DataFrame(\n    {\n        &quot;variable&quot;: var_names,\n        &quot;coef&quot;: betas[: len(var_names)],\n        &quot;std_err&quot;: std_err[: len(var_names)],\n        &quot;z&quot;: z_vals[: len(var_names)],\n        &quot;p_value&quot;: p_vals[: len(var_names)],\n    }\n)\n\n# Add model fit stats as repeated columns for easy manuscript use\nfit_stats = {\n    &quot;n&quot;: int(model.n),\n    &quot;k&quot;: int(model.k),\n    &quot;aic&quot;: float(getattr(model, &quot;aic&quot;, np.nan)),\n    &quot;bic&quot;: float(getattr(model, &quot;schwarz&quot;, np.nan)),\n    &quot;pseudo_r2&quot;: float(getattr(model, &quot;pr2&quot;, np.nan)),\n}\nfor k, v in fit_stats.items():\n    coef_df[k] = v\n\n# -----------------------------\n# Save primary output\n# -----------------------------\ncoef_df.to_csv(OUTPUT_NODE_PATH, index=False)\n\n# Also save a manuscript-ready copy into tables/ and record it\ntables_dir = os.path.join(OUTPUT_DIR, &quot;tables&quot;)\nos.makedirs(tables_dir, exist_ok=True)\ntable_path = os.path.join(tables_dir, &quot;spatial_lag_pm25_gini_metro_interaction_2019.csv&quot;)\ncoef_df.to_csv(table_path, index=False)\n\n# Create a map showing the coefficients of estimation\ngdf[&#x27;coefficients&#x27;] = np.dot(X, betas[1:len(var_names) - 1]) + betas[0]\n\nfig, ax = plt.subplots(1, 1, figsize=(10, 8))\ngdf.plot(column=&#x27;coefficients&#x27;, cmap=&#x27;coolwarm&#x27;, linewidth=0.8, ax=ax, edgecolor=&#x27;0.8&#x27;, legend=True)\nax.set_title(&#x27;Coefficients of Estimation&#x27;, fontsize=15)\nax.legend(title=&#x27;Coefficient Value&#x27;)  # Add legend title for better readability\nax.set_axis_off()\n\ncoeff_map_output_path = os.path.join(OUTPUT_DIR, &quot;spatial_lag_coefficients_map_2019.png&quot;)\nplt.savefig(coeff_map_output_path, dpi=300)\n\nrecord_table(\n    output_dir=OUTPUT_DIR,\n    file_path=table_path,\n    caption=&quot;Maximum-likelihood spatial lag (SAR) model coefficients for county PM2.5 (2019) with Gini, Metro2013, and their interaction using Queen contiguity weights keyed by GEOID.&quot;,\n    role=&quot;final&quot;,\n    columns=list(coef_df.columns),\n)\n\n# -----------------------------\n# Create map showing residuals\n# -----------------------------\n# Calculate residuals\npredictions = model.predy\nresiduals = y.flatten() - predictions.flatten()\n\n# Add residuals to the GeoDataFrame\ngdf[&#x27;residuals&#x27;] = residuals\n\n# Plot residuals\nfig, ax = plt.subplots(1, 1, figsize=(10, 8))\ngdf.plot(column=&#x27;residuals&#x27;, cmap=&#x27;coolwarm&#x27;, linewidth=0.8, ax=ax, edgecolor=&#x27;0.8&#x27;, legend=True)\nax.set_title(&#x27;Residuals of Spatial Lag Model&#x27;, fontsize=15)\nax.legend(title=&#x27;Residual Value&#x27;)  # Add legend title for better readability\nax.set_axis_off()\n\n# Save the map\nmap_output_path = os.path.join(OUTPUT_DIR, &quot;spatial_lag_residuals_map_2019.png&quot;)\nplt.savefig(map_output_path, dpi=300)</pre></div><div class=\"code-section output-section\"><h4>Output</h4><pre>ML_Lag\n</pre></div><div class=\"code-section\"><h4>Created Files</h4><div class=\"files-list\"><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/manifest.json</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/spatial_lag_coefficients_map_2019.png</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/spatial_lag_pm25_gini_metro_interaction_2019.csv</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/spatial_lag_residuals_map_2019.png</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/tables/spatial_lag_pm25_gini_metro_interaction_2019.csv</span></div></div>", "obj3_s6": "<h3 style=\"border-bottom-color:#55A868; display:flex; align-items:center; justify-content:space-between; gap:8px;\"><span style=\"cursor:pointer;\" onclick=\"goToStepCard('exec_obj3_step6')\">OBJECTIVE 3 | Step 6</span><button onclick=\"goToStepCard('exec_obj3_step6')\" style=\"font-size:0.65em; padding:3px 10px; border:1px solid #4a90d9; border-radius:4px; background:#f0f6ff; color:#2a6cb6; cursor:pointer; white-space:nowrap;\">Go to Card</button></h3><div class=\"meta-grid\"><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\"><span class=\"meta-label\">Agent</span><span class=\"meta-value\">ModelingAgent</span></div><div class=\"meta-item\" style=\"grid-column:span 2\"><span class=\"meta-label\">Description</span><span class=\"meta-value\">Compute Spearman rank correlation between `pm25_mean_2019` and `B19083_001E:Gini Index` separately for counties where `Metro2013 == 1` and where `Metro2013 == 0`, reporting correlation and group sample size.</span></div></div><div class=\"meta-item\" style=\"margin-bottom:12px\"><span class=\"meta-label\">Code File</span><span class=\"meta-value\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/generated_code/op_groupwise_spearman_rank_correl_f26970f6.py</span></div><div class=\"code-section\"><h4>Executed Code</h4><pre>import os\nimport pandas as pd\nimport geopandas as gpd\nfrom scipy.stats import spearmanr\n\nINPUT_PATH = &quot;/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/counties_pm25_gini_urbanrural_2019.gpkg&quot;\nOUTPUT_PATH = &quot;/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/pm25_gini_spearman_by_metro_2019.csv&quot;\nOUTPUT_DIR = os.path.dirname(OUTPUT_PATH)\n\nos.makedirs(os.path.dirname(OUTPUT_PATH), exist_ok=True)\n\n# ---- Load -----------------------------------------------------------------\ngdf = gpd.read_file(INPUT_PATH)\n\n# Validate geometry (rule), though not used in correlation\nif &quot;geometry&quot; in gdf.columns:\n    gdf = gdf[gdf.geometry.notna()]\n    gdf = gdf[gdf.geometry.is_valid &amp; ~gdf.geometry.is_empty]\n\nx_col = &quot;pm25_mean_2019&quot;\ny_col = &quot;B19083_001E:Gini Index&quot;\ngroup_col = &quot;Metro2013&quot;\n\nneeded = [x_col, y_col, group_col]\nmissing = [c for c in needed if c not in gdf.columns]\nif missing:\n    raise KeyError(f&quot;Missing columns: {missing}. Available columns: {list(gdf.columns)}&quot;)\n\n# ---- Prep: cast to numeric, pairwise drop NAs -----------------------------\ndf = gdf[[group_col, x_col, y_col]].copy()\ndf[group_col] = pd.to_numeric(df[group_col], errors=&quot;coerce&quot;)\ndf[x_col] = pd.to_numeric(df[x_col], errors=&quot;coerce&quot;)\ndf[y_col] = pd.to_numeric(df[y_col], errors=&quot;coerce&quot;)\n\nrows = []\nfor metro_val, label in [(1, &quot;metro&quot;), (0, &quot;nonmetro&quot;)]:\n    sub = df[df[group_col] == metro_val].copy()\n    sub = sub.dropna(subset=[x_col, y_col])\n    n = len(sub)\n\n    if n &lt; 2:\n        rho, pval = float(&quot;nan&quot;), float(&quot;nan&quot;)\n    else:\n        rho, pval = spearmanr(sub[x_col], sub[y_col])\n\n    rows.append(\n        {\n            &quot;group&quot;: label,\n            &quot;Metro2013&quot;: int(metro_val),\n            &quot;n&quot;: int(n),\n            &quot;x&quot;: x_col,\n            &quot;y&quot;: y_col,\n            &quot;spearman_rho&quot;: float(rho) if pd.notna(rho) else float(&quot;nan&quot;),\n            &quot;spearman_p&quot;: float(pval) if pd.notna(pval) else float(&quot;nan&quot;),\n        }\n    )\n\nout_df = pd.DataFrame(rows)\nout_df.to_csv(OUTPUT_PATH, index=False)\n\n# Manuscript artifact (table)\ntables_dir = os.path.join(OUTPUT_DIR, &quot;tables&quot;)\nos.makedirs(tables_dir, exist_ok=True)\ntable_path = os.path.join(tables_dir, &quot;pm25_gini_spearman_by_metro_2019.csv&quot;)\nout_df.to_csv(table_path, index=False)\n\nrecord_table(\n    output_dir=OUTPUT_DIR,\n    file_path=table_path,\n    caption=&quot;Spearman rank correlation between 2019 county PM2.5 and Gini Index, stratified by Metro2013 status, with sample sizes.&quot;,\n    role=&quot;final&quot;,\n    columns=[&quot;group&quot;, &quot;Metro2013&quot;, &quot;n&quot;, &quot;spearman_rho&quot;, &quot;spearman_p&quot;, &quot;x&quot;, &quot;y&quot;],\n)</pre></div><div class=\"code-section\"><h4>Created Files</h4><div class=\"files-list\"><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/manifest.json</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/pm25_gini_spearman_by_metro_2019.csv</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/tables/pm25_gini_spearman_by_metro_2019.csv</span></div></div>", "result_collation": "<h3 style=\"border-bottom-color:#D4A017;\">Result Collation</h3><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\" style=\"margin-top:8px\"><span class=\"meta-label\">Figures</span><span class=\"meta-value\">15 figure(s) cataloged</span></div>", "manuscript": "<h3 style=\"border-bottom-color:#7B2D8E;\">Manuscript</h3><div class=\"meta-item\"><span class=\"meta-label\">Status</span><span class=\"meta-value\" style=\"color:#28a745;font-weight:bold;\">Completed</span></div><div class=\"meta-item\" style=\"margin-top:8px\"><span class=\"meta-label\">File</span><span class=\"meta-value\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/manuscript.md</span></div><div class=\"code-section\"><h4>Exported Formats</h4><div class=\"files-list\"><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/manuscript.docx</span><span class=\"file-tag\">/bigdata/s0/tea5209/AGM/Outputs/a4c5a1b9-449e-440c-a2cf-003513b58787/manuscript.pdf</span></div></div><div class=\"code-section\"><h4>Content Preview</h4><pre style=\"color:#e2e8f0;max-height:400px;\"># Spatial Inequality in Fine Particulate Exposure and Income Inequality Across California Counties in 2019\n\n## Abstract\n\n**Background and Purpose:** County-level fine particulate matter (PM2.5) exposure and socioeconomic inequality are unevenly distributed, yet the extent to which income inequality aligns with spatial variation in PM2.5\u2014and whether this relationship is conditioned by urban\u2013rural context\u2014remains uncertain at the county scale in California. This study quantifies 2019 county PM2.5 patterns, evaluates spatial dependence, and assesses the county-level association between PM2.5 and income inequality (Gini), with an urban\u2013rural classification prepared for stratified interpretation. **Methods:** Annual PM2.5 monitor summaries were compiled for California in 2019 and aggregated to counties using a five-digit Federal Information Processing Standard geographic identifier, producing monitor-derived county means and site counts (58 counties total). Income inequality was measured using the 2019 county Gini Index (mean 0.459, SD 0.025; range 0.400\u20130.540) and joined to the county polygon layer; spatial dependence structures were defined using Queen contiguity weights (mean 4.79 neighbors; range 2\u20138) and a $k=5$ nearest-neighbor alternative. Ordinary least squares regression of county mean PM2.5 on the Gini Index was estimated with fitted values and residuals appended for spatial diagnostics; an urban\u2013rural metropolitan indicator (Metro2013) was integrated for subsequent effe</pre></div>"};

// Zoom & Pan state
let scale = 1;
let panX = 0, panY = 0;
let isPanning = false;
let _wasDragged = false;
let panStartX = 0, panStartY = 0;
let _mdX = 0, _mdY = 0;
const PAN_THRESHOLD = 4;
const MIN_SCALE = 0.2;
const MAX_SCALE = 5;
const ZOOM_STEP = 0.15;
const svg = document.getElementById('flowchartSvg');
const zoomGroup = document.getElementById('zoomGroup');
const graphPanel = document.getElementById('graphPanel');

function applyTransform() {
  zoomGroup.setAttribute('transform', `translate(${panX}, ${panY}) scale(${scale})`);
  document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
}

function zoomIn() {
  scale = Math.min(MAX_SCALE, scale + ZOOM_STEP);
  applyTransform();
}

function zoomOut() {
  scale = Math.max(MIN_SCALE, scale - ZOOM_STEP);
  applyTransform();
}

function zoomReset() {
  scale = 1; panX = 0; panY = 0;
  applyTransform();
}

function zoomFit() {
  const bbox = zoomGroup.getBBox();
  const vb = svg.viewBox.baseVal;
  const pad = 30;
  const scaleX = (vb.width - pad * 2) / bbox.width;
  const scaleY = (vb.height - pad * 2) / bbox.height;
  scale = Math.min(scaleX, scaleY, MAX_SCALE);
  panX = (vb.width / scale - bbox.width) / 2 - bbox.x + pad / scale;
  panY = (vb.height / scale - bbox.height) / 2 - bbox.y + pad / scale;
  applyTransform();
}

function toggleFullscreen() {
  const elem = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
      elem.webkitRequestFullscreen();
    }
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
  }
}

document.addEventListener('fullscreenchange', function() {
  const btn = document.getElementById('fullscreenBtn');
  if (document.fullscreenElement) {
    btn.innerHTML = '&#x2716;';
    btn.title = 'Exit fullscreen';
  } else {
    btn.innerHTML = '&#x26F6;';
    btn.title = 'Toggle fullscreen';
  }
  setTimeout(zoomFit, 200);
});

// Mouse wheel zoom (centered on cursor)
graphPanel.addEventListener('wheel', function(e) {
  e.preventDefault();
  const rect = svg.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  const vb = svg.viewBox.baseVal;
  const svgX = (mouseX / rect.width) * vb.width;
  const svgY = (mouseY / rect.height) * vb.height;
  const oldScale = scale;
  if (e.deltaY < 0) {
    scale = Math.min(MAX_SCALE, scale + ZOOM_STEP);
  } else {
    scale = Math.max(MIN_SCALE, scale - ZOOM_STEP);
  }
  panX = svgX / scale - svgX / oldScale + panX;
  panY = svgY / scale - svgY / oldScale + panY;
  applyTransform();
}, { passive: false });

// Pan with left-click drag (or middle mouse)
graphPanel.addEventListener('mousedown', function(e) {
  if (e.button === 0 || e.button === 1) {
    e.preventDefault();
    isPanning = true;
    _wasDragged = false;
    panStartX = e.clientX;
    panStartY = e.clientY;
    _mdX = e.clientX;
    _mdY = e.clientY;
    graphPanel.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', function(e) {
  if (!isPanning) return;
  const dist = Math.abs(e.clientX - _mdX) + Math.abs(e.clientY - _mdY);
  if (dist > PAN_THRESHOLD) _wasDragged = true;
  const vb = svg.viewBox.baseVal;
  const rect = svg.getBoundingClientRect();
  const dx = (e.clientX - panStartX) * (vb.width / rect.width) / scale;
  const dy = (e.clientY - panStartY) * (vb.height / rect.height) / scale;
  panX += dx;
  panY += dy;
  panStartX = e.clientX;
  panStartY = e.clientY;
  applyTransform();
});

window.addEventListener('mouseup', function() {
  if (isPanning) {
    isPanning = false;
    graphPanel.style.cursor = '';
  }
});

// Suppress node clicks after a drag
graphPanel.addEventListener('click', function(e) {
  if (_wasDragged) {
    e.stopPropagation();
    _wasDragged = false;
  }
}, true);

// Node popup
function showPopup(nodeId) {
  const content = document.getElementById('popupContent');
  const overlay = document.getElementById('popupOverlay');
  if (details[nodeId]) {
    content.innerHTML = details[nodeId];
  } else {
    content.innerHTML = '<p style="color:#999; font-style:italic;">No details available.</p>';
  }
  overlay.classList.add('visible');

  // Highlight selected node
  document.querySelectorAll('.node-box rect, .node-box polygon').forEach(el => {
    el.setAttribute('stroke-width', el.tagName === 'polygon' ? '2' : '1.5');
    el.setAttribute('stroke', el.dataset.origStroke || '#333');
  });
  const clicked = event.currentTarget.querySelector('rect, polygon');
  if (clicked) {
    clicked.setAttribute('stroke-width', '3.5');
    clicked.setAttribute('stroke', '#FFD700');
  }
}

function closePopup(e) {
  if (e && e.target !== document.getElementById('popupOverlay')) return;
  document.getElementById('popupOverlay').classList.remove('visible');
  document.querySelectorAll('.node-box rect, .node-box polygon').forEach(el => {
    el.setAttribute('stroke-width', el.tagName === 'polygon' ? '2' : '1.5');
    el.setAttribute('stroke', el.dataset.origStroke || '#333');
  });
}

// Navigate to the step card in the parent WebUI
function goToStepCard(phase) {
  closePopup();
  // If inside an iframe, post message to parent; otherwise try directly
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ type: 'scrollToStepCard', phase: phase }, '*');
  } else {
    // Standalone — try finding the card in this document
    const card = document.getElementById('wf-card-' + phase);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePopup();
});

// Store original stroke colors
document.querySelectorAll('.node-box rect, .node-box polygon').forEach(el => {
  el.dataset.origStroke = el.getAttribute('stroke') || '#333';
});

// Fit to view on initial load
window.addEventListener('DOMContentLoaded', function() {
  setTimeout(zoomFit, 100);
});
