<script>
const details = {"o1_s1_i0": "<h3>Input Data</h3><p><b>Name:</b> PM2.5_Annual_California_2019</p>", "o1_s1_op": "<h3>Step 1.1: row_filter</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> PM2.5_Annual_California_2019</p><p><b>Output:</b> pm25_2019_annual_records.csv</p><p><b>Description:</b> Filter `PM2.5_Annual_California_2019` to rows where `year == 2019` and `pollutant_standard == &#x27;PM25 Annual 2006&#x27;`, keeping only `state_code`, `county_code`, `site_number`, and `arithmetic_mean`.</p>", "o1_s1_out": "<h3>Output Data</h3><p><b>Name:</b> pm25_2019_annual_records.csv</p>", "o1_s2_op": "<h3>Step 1.2: derive_column</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> pm25_2019_annual_records.csv</p><p><b>Output:</b> pm25_2019_with_geoid.csv</p><p><b>Description:</b> Create county `GEOID` as a 5-character string by concatenating zero-padded `state_code` (2 digits) and zero-padded `county_code` (3 digits).</p>", "o1_s2_out": "<h3>Output Data</h3><p><b>Name:</b> pm25_2019_with_geoid.csv</p>", "o1_s3_op": "<h3>Step 1.3: groupby_aggregate_mean_and_count</h3><p><b>Operation Type:</b> aggregation</p><p><b>Inputs:</b> pm25_2019_with_geoid.csv</p><p><b>Output:</b> pm25_county_2019.csv</p><p><b>Description:</b> Group by `GEOID` and compute `pm25_mean_2019 = mean(arithmetic_mean)` and `pm25_site_count_2019 = count(site_number)`.</p><p><b>Expected Output:</b> A county-level PM2.5 table with `GEOID`, `pm25_mean_2019`, and `pm25_site_count_2019`.</p>", "o1_s3_out": "<h3>Output Data</h3><p><b>Name:</b> pm25_county_2019.csv</p><p><b>Description:</b> A county-level PM2.5 table with `GEOID`, `pm25_mean_2019`, and `pm25_site_count_2019`.</p>", "o1_s4_i0": "<h3>Input Data</h3><p><b>Name:</b> california_counties_2019</p>", "o1_s4_op": "<h3>Step 1.4: attribute_join</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> california_counties_2019, pm25_county_2019.csv</p><p><b>Output:</b> counties_pm25_2019.gpkg</p><p><b>Description:</b> Left-join `pm25_county_2019.csv` to `california_counties_2019` on `GEOID` to attach `pm25_mean_2019` and `pm25_site_count_2019` to county polygons.</p><p><b>Expected Output:</b> County polygons with `pm25_mean_2019` and `pm25_site_count_2019` attached.</p>", "o1_s4_out": "<h3>Output Data</h3><p><b>Name:</b> counties_pm25_2019.gpkg</p><p><b>Description:</b> County polygons with `pm25_mean_2019` and `pm25_site_count_2019` attached.</p>", "o1_s5_op": "<h3>Step 1.5: derive_column</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> counties_pm25_2019.gpkg</p><p><b>Output:</b> counties_pm25_2019_qc.gpkg</p><p><b>Description:</b> Create `pm25_missing_2019` as a boolean indicator where `pm25_mean_2019` is null to identify counties with no monitor-derived PM2.5 summary in 2019.</p>", "o1_s5_out": "<h3>Output Data</h3><p><b>Name:</b> counties_pm25_2019_qc.gpkg</p>", "o1_s6_op": "<h3>Step 1.6: spatial_weights_queen_contiguity</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> counties_pm25_2019_qc.gpkg</p><p><b>Output:</b> ca_county_queen_weights_2019.gpkg</p><p><b>Description:</b> Construct Queen contiguity spatial weights from county `geometry`, keyed by `GEOID`.</p>", "o1_s6_out": "<h3>Output Data</h3><p><b>Name:</b> ca_county_queen_weights_2019.gpkg</p>", "o1_s7_op": "<h3>Step 1.7: global_morans_I</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> counties_pm25_2019_qc.gpkg, ca_county_queen_weights_2019.gpkg</p><p><b>Output:</b> pm25_global_moransI_2019.csv</p><p><b>Description:</b> Compute global Moran\u2019s I for `pm25_mean_2019` using the Queen contiguity weights.</p><p><b>Expected Output:</b> A table with Moran\u2019s I, expected I, variance, z-score, and p-value for `pm25_mean_2019` in 2019.</p>", "o1_s7_out": "<h3>Output Data</h3><p><b>Name:</b> pm25_global_moransI_2019.csv</p><p><b>Description:</b> A table with Moran\u2019s I, expected I, variance, z-score, and p-value for `pm25_mean_2019` in 2019.</p>", "o2_s1_i0": "<h3>Input Data</h3><p><b>Name:</b> California_Counties_Gini_2019</p>", "o2_s1_op": "<h3>Step 2.1: row_filter</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> California_Counties_Gini_2019</p><p><b>Output:</b> gini_2019_filtered.csv</p><p><b>Description:</b> Filter `California_Counties_Gini_2019` to rows where `year == 2019`, keeping only `state_fips`, `county_fips`, and `B19083_001E:Gini Index`.</p>", "o2_s1_out": "<h3>Output Data</h3><p><b>Name:</b> gini_2019_filtered.csv</p>", "o2_s2_op": "<h3>Step 2.2: derive_column</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> gini_2019_filtered.csv</p><p><b>Output:</b> gini_2019_with_geoid.csv</p><p><b>Description:</b> Create county `GEOID` as a 5-character string by concatenating zero-padded `state_fips` (2 digits) and zero-padded `county_fips` (3 digits), and retain `GEOID` and `B19083_001E:Gini Index`.</p>", "o2_s2_out": "<h3>Output Data</h3><p><b>Name:</b> gini_2019_with_geoid.csv</p>", "o2_s3_op": "<h3>Step 2.3: attribute_join</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> counties_pm25_2019_qc.gpkg, gini_2019_with_geoid.csv</p><p><b>Output:</b> counties_pm25_gini_2019.gpkg</p><p><b>Description:</b> Left-join `gini_2019_with_geoid.csv` to `counties_pm25_2019_qc.gpkg` on `GEOID` to attach `B19083_001E:Gini Index` to each county.</p><p><b>Expected Output:</b> County polygons with `pm25_mean_2019` and `B19083_001E:Gini Index` for 2019.</p>", "o2_s3_out": "<h3>Output Data</h3><p><b>Name:</b> counties_pm25_gini_2019.gpkg</p><p><b>Description:</b> County polygons with `pm25_mean_2019` and `B19083_001E:Gini Index` for 2019.</p>", "o2_s4_op": "<h3>Step 2.4: ordinary_least_squares_append_residuals</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> counties_pm25_gini_2019.gpkg</p><p><b>Output:</b> counties_pm25_gini_2019_olsresid.gpkg</p><p><b>Description:</b> Fit an OLS model with dependent variable `pm25_mean_2019` and predictor `B19083_001E:Gini Index`, and append model outputs to features as `ols_fitted_pm25` and `ols_residual_pm25` keyed by `GEOID`.</p><p><b>Expected Output:</b> County layer with OLS fitted values (`ols_fitted_pm25`) and residuals (`ols_residual_pm25`) for `pm25_mean_2019`.</p>", "o2_s4_out": "<h3>Output Data</h3><p><b>Name:</b> counties_pm25_gini_2019_olsresid.gpkg</p><p><b>Description:</b> County layer with OLS fitted values (`ols_fitted_pm25`) and residuals (`ols_residual_pm25`) for `pm25_mean_2019`.</p>", "o2_s5_op": "<h3>Step 2.5: global_morans_I</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> counties_pm25_gini_2019_olsresid.gpkg, ca_county_queen_weights_2019.gpkg</p><p><b>Output:</b> ols_residuals_moransI_2019.csv</p><p><b>Description:</b> Compute global Moran\u2019s I for `ols_residual_pm25` using the Queen contiguity weights keyed by `GEOID`.</p><p><b>Expected Output:</b> A table with Moran\u2019s I, z-score, and p-value for spatial autocorrelation in OLS residuals.</p>", "o2_s5_out": "<h3>Output Data</h3><p><b>Name:</b> ols_residuals_moransI_2019.csv</p><p><b>Description:</b> A table with Moran\u2019s I, z-score, and p-value for spatial autocorrelation in OLS residuals.</p>", "o2_s6_op": "<h3>Step 2.6: spatial_lag_model_maximum_likelihood</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> counties_pm25_gini_2019.gpkg, ca_county_queen_weights_2019.gpkg</p><p><b>Output:</b> spatial_lag_pm25_on_gini_2019.csv</p><p><b>Description:</b> Fit a maximum-likelihood spatial lag (SAR) model with dependent variable `pm25_mean_2019` and predictor `B19083_001E:Gini Index` using the Queen contiguity weights keyed by `GEOID`.</p><p><b>Expected Output:</b> A table of spatial lag model estimates including the `B19083_001E:Gini Index` coefficient, the spatial autoregressive parameter, standard errors, and fit statistics.</p>", "o2_s6_out": "<h3>Output Data</h3><p><b>Name:</b> spatial_lag_pm25_on_gini_2019.csv</p><p><b>Description:</b> A table of spatial lag model estimates including the `B19083_001E:Gini Index` coefficient, the spatial autoregressive parameter, standard errors, and fit statistics.</p>", "o2_s7_op": "<h3>Step 2.7: spatial_weights_knn</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> counties_pm25_gini_2019.gpkg</p><p><b>Output:</b> ca_county_knn_weights_2019.gpkg</p><p><b>Description:</b> Construct K-nearest-neighbors (KNN) spatial weights with k=5 from county `geometry` centroids, keyed by `GEOID`.</p>", "o2_s7_out": "<h3>Output Data</h3><p><b>Name:</b> ca_county_knn_weights_2019.gpkg</p>", "o2_s8_op": "<h3>Step 2.8: spatial_error_model_maximum_likelihood</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> counties_pm25_gini_2019.gpkg, ca_county_knn_weights_2019.gpkg</p><p><b>Output:</b> spatial_error_pm25_on_gini_2019.csv</p><p><b>Description:</b> Fit a maximum-likelihood spatial error (SEM) model with dependent variable `pm25_mean_2019` and predictor `B19083_001E:Gini Index` using KNN weights (k=5) keyed by `GEOID`.</p><p><b>Expected Output:</b> A table of spatial error model estimates including the `B19083_001E:Gini Index` coefficient, the spatial error parameter, standard errors, and fit statistics.</p>", "o2_s8_out": "<h3>Output Data</h3><p><b>Name:</b> spatial_error_pm25_on_gini_2019.csv</p><p><b>Description:</b> A table of spatial error model estimates including the `B19083_001E:Gini Index` coefficient, the spatial error parameter, standard errors, and fit statistics.</p>", "o3_s1_i0": "<h3>Input Data</h3><p><b>Name:</b> California_UrbanRural_Classification_2019</p>", "o3_s1_op": "<h3>Step 3.1: derive_column</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> California_UrbanRural_Classification_2019</p><p><b>Output:</b> urban_rural_with_geoid.csv</p><p><b>Description:</b> Create county `GEOID` as a 5-character string from `FIPSTXT` using zero-padding, and keep `GEOID`, `Metro2013`, `Nonmetro2013`, and `RuralUrbanContinuumCode2013`.</p>", "o3_s1_out": "<h3>Output Data</h3><p><b>Name:</b> urban_rural_with_geoid.csv</p>", "o3_s2_op": "<h3>Step 3.2: attribute_join</h3><p><b>Operation Type:</b> geoprocessing</p><p><b>Inputs:</b> counties_pm25_gini_2019.gpkg, urban_rural_with_geoid.csv</p><p><b>Output:</b> counties_pm25_gini_urbanrural_2019.gpkg</p><p><b>Description:</b> Left-join `urban_rural_with_geoid.csv` to `counties_pm25_gini_2019.gpkg` on `GEOID` to attach `Metro2013` to each county.</p><p><b>Expected Output:</b> County polygons with `pm25_mean_2019`, `B19083_001E:Gini Index`, and `Metro2013`.</p>", "o3_s2_out": "<h3>Output Data</h3><p><b>Name:</b> counties_pm25_gini_urbanrural_2019.gpkg</p><p><b>Description:</b> County polygons with `pm25_mean_2019`, `B19083_001E:Gini Index`, and `Metro2013`.</p>", "o3_s3_op": "<h3>Step 3.3: derive_column</h3><p><b>Operation Type:</b> data_wrangling</p><p><b>Inputs:</b> counties_pm25_gini_urbanrural_2019.gpkg</p><p><b>Output:</b> counties_pm25_gini_urbanrural_interaction_2019.gpkg</p><p><b>Description:</b> Create interaction term `gini_x_metro = (B19083_001E:Gini Index) * Metro2013`.</p>", "o3_s3_out": "<h3>Output Data</h3><p><b>Name:</b> counties_pm25_gini_urbanrural_interaction_2019.gpkg</p>", "o3_s4_op": "<h3>Step 3.4: ordinary_least_squares_with_interaction</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> counties_pm25_gini_urbanrural_interaction_2019.gpkg</p><p><b>Output:</b> ols_pm25_gini_metro_interaction_2019.csv</p><p><b>Description:</b> Fit an OLS model with dependent variable `pm25_mean_2019` and predictors `B19083_001E:Gini Index`, `Metro2013`, and `gini_x_metro`, and report coefficient estimates, standard errors, and p-values.</p><p><b>Expected Output:</b> A coefficient table where the `gini_x_metro` term tests whether the `B19083_001E:Gini Index` slope differs by `Metro2013`.</p>", "o3_s4_out": "<h3>Output Data</h3><p><b>Name:</b> ols_pm25_gini_metro_interaction_2019.csv</p><p><b>Description:</b> A coefficient table where the `gini_x_metro` term tests whether the `B19083_001E:Gini Index` slope differs by `Metro2013`.</p>", "o3_s5_op": "<h3>Step 3.5: spatial_lag_model_maximum_likelihood_with_interaction</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> counties_pm25_gini_urbanrural_interaction_2019.gpkg, ca_county_queen_weights_2019.gpkg</p><p><b>Output:</b> spatial_lag_pm25_gini_metro_interaction_2019.csv</p><p><b>Description:</b> Fit a maximum-likelihood spatial lag (SAR) model with dependent variable `pm25_mean_2019` and predictors `B19083_001E:Gini Index`, `Metro2013`, and `gini_x_metro` using Queen contiguity weights keyed by `GEOID`.</p><p><b>Expected Output:</b> A spatial lag model coefficient table where `gini_x_metro` quantifies metro effect modification under spatial dependence.</p>", "o3_s5_out": "<h3>Output Data</h3><p><b>Name:</b> spatial_lag_pm25_gini_metro_interaction_2019.csv</p><p><b>Description:</b> A spatial lag model coefficient table where `gini_x_metro` quantifies metro effect modification under spatial dependence.</p>", "o3_s6_op": "<h3>Step 3.6: groupwise_spearman_rank_correlation</h3><p><b>Operation Type:</b> statistical</p><p><b>Inputs:</b> counties_pm25_gini_urbanrural_2019.gpkg</p><p><b>Output:</b> pm25_gini_spearman_by_metro_2019.csv</p><p><b>Description:</b> Compute Spearman rank correlation between `pm25_mean_2019` and `B19083_001E:Gini Index` separately for counties where `Metro2013 == 1` and where `Metro2013 == 0`, reporting correlation and group sample size.</p><p><b>Expected Output:</b> A two-row table of metro vs nonmetro Spearman correlations with sample sizes.</p>", "o3_s6_out": "<h3>Output Data</h3><p><b>Name:</b> pm25_gini_spearman_by_metro_2019.csv</p><p><b>Description:</b> A two-row table of metro vs nonmetro Spearman correlations with sample sizes.</p>", "rq_node": "<h3>Research Question</h3><p>How do spatial inequalities in PM2.5 exposure across California counties vary with income inequality (Gini) in 2019, and does the spatial relationship vary by urban\u2013rural classification?</p>", "stage_0": "<h3>Result Collation</h3><p>Collate outputs and results from all objectives into a unified dataset for analysis.</p>", "stage_1": "<h3>Results Analysis</h3><p>Perform statistical analysis, validation, and interpretation of the collated results.</p>", "stage_2": "<h3>Discussion of Results</h3><p>Synthesise findings, compare with hypotheses, and discuss implications.</p>", "stage_3": "<h3>Manuscript</h3><p>Final research deliverable: paper, report, or document combining all findings.</p>", "obj_title_1": "<h3>Objective 1</h3><p><b>Title:</b> Assess how PM2.5 exposure varies across California counties in 2019 and whether county-level PM2.5 is spatially clustered</p><p><b>Hypothesis:</b> County-level annual PM2.5 exposure in 2019 is spatially clustered (positive global Moran\u2019s I) rather than randomly distributed across California.</p><p><b>Steps:</b></p><ol><li><b>row_filter</b>: Filter `PM2.5_Annual_California_2019` to rows where `year == 2019` and `pollutant_standard == &#x27;PM25 Annual 2006&#x27;`, keeping only `state_code`, `county_code`, `site_number`, and `arithmetic_mean`.</li><li><b>derive_column</b>: Create county `GEOID` as a 5-character string by concatenating zero-padded `state_code` (2 digits) and zero-padded `county_code` (3 digits).</li><li><b>groupby_aggregate_mean_and_count</b>: Group by `GEOID` and compute `pm25_mean_2019 = mean(arithmetic_mean)` and `pm25_site_count_2019 = count(site_number)`.</li><li><b>attribute_join</b>: Left-join `pm25_county_2019.csv` to `california_counties_2019` on `GEOID` to attach `pm25_mean_2019` and `pm25_site_count_2019` to county polygons.</li><li><b>derive_column</b>: Create `pm25_missing_2019` as a boolean indicator where `pm25_mean_2019` is null to identify counties with no monitor-derived PM2.5 summary in 2019.</li><li><b>spatial_weights_queen_contiguity</b>: Construct Queen contiguity spatial weights from county `geometry`, keyed by `GEOID`.</li><li><b>global_morans_I</b>: Compute global Moran\u2019s I for `pm25_mean_2019` using the Queen contiguity weights.</li></ol>", "obj_title_2": "<h3>Objective 2</h3><p><b>Title:</b> Estimate the county-level association between PM2.5 exposure and income inequality (Gini) in 2019 and test whether residual spatial autocorrelation remains</p><p><b>Hypothesis:</b> Higher county income inequality (`B19083_001E:Gini Index`) is associated with higher county mean PM2.5 (`pm25_mean_2019`) in 2019, and OLS residuals exhibit spatial autocorrelation indicating the need for a spatial regression specification.</p><p><b>Steps:</b></p><ol><li><b>row_filter</b>: Filter `California_Counties_Gini_2019` to rows where `year == 2019`, keeping only `state_fips`, `county_fips`, and `B19083_001E:Gini Index`.</li><li><b>derive_column</b>: Create county `GEOID` as a 5-character string by concatenating zero-padded `state_fips` (2 digits) and zero-padded `county_fips` (3 digits), and retain `GEOID` and `B19083_001E:Gini Index`.</li><li><b>attribute_join</b>: Left-join `gini_2019_with_geoid.csv` to `counties_pm25_2019_qc.gpkg` on `GEOID` to attach `B19083_001E:Gini Index` to each county.</li><li><b>ordinary_least_squares_append_residuals</b>: Fit an OLS model with dependent variable `pm25_mean_2019` and predictor `B19083_001E:Gini Index`, and append model outputs to features as `ols_fitted_pm25` and `ols_residual_pm25` keyed by `GEOID`.</li><li><b>global_morans_I</b>: Compute global Moran\u2019s I for `ols_residual_pm25` using the Queen contiguity weights keyed by `GEOID`.</li><li><b>spatial_lag_model_maximum_likelihood</b>: Fit a maximum-likelihood spatial lag (SAR) model with dependent variable `pm25_mean_2019` and predictor `B19083_001E:Gini Index` using the Queen contiguity weights keyed by `GEOID`.</li><li><b>spatial_weights_knn</b>: Construct K-nearest-neighbors (KNN) spatial weights with k=5 from county `geometry` centroids, keyed by `GEOID`.</li><li><b>spatial_error_model_maximum_likelihood</b>: Fit a maximum-likelihood spatial error (SEM) model with dependent variable `pm25_mean_2019` and predictor `B19083_001E:Gini Index` using KNN weights (k=5) keyed by `GEOID`.</li></ol>", "obj_title_3": "<h3>Objective 3</h3><p><b>Title:</b> Test whether the 2019 PM2.5\u2013income inequality association differs by metro status at the county level</p><p><b>Hypothesis:</b> The association between `B19083_001E:Gini Index` and `pm25_mean_2019` differs by `Metro2013` status (effect modification).</p><p><b>Steps:</b></p><ol><li><b>derive_column</b>: Create county `GEOID` as a 5-character string from `FIPSTXT` using zero-padding, and keep `GEOID`, `Metro2013`, `Nonmetro2013`, and `RuralUrbanContinuumCode2013`.</li><li><b>attribute_join</b>: Left-join `urban_rural_with_geoid.csv` to `counties_pm25_gini_2019.gpkg` on `GEOID` to attach `Metro2013` to each county.</li><li><b>derive_column</b>: Create interaction term `gini_x_metro = (B19083_001E:Gini Index) * Metro2013`.</li><li><b>ordinary_least_squares_with_interaction</b>: Fit an OLS model with dependent variable `pm25_mean_2019` and predictors `B19083_001E:Gini Index`, `Metro2013`, and `gini_x_metro`, and report coefficient estimates, standard errors, and p-values.</li><li><b>spatial_lag_model_maximum_likelihood_with_interaction</b>: Fit a maximum-likelihood spatial lag (SAR) model with dependent variable `pm25_mean_2019` and predictors `B19083_001E:Gini Index`, `Metro2013`, and `gini_x_metro` using Queen contiguity weights keyed by `GEOID`.</li><li><b>groupwise_spearman_rank_correlation</b>: Compute Spearman rank correlation between `pm25_mean_2019` and `B19083_001E:Gini Index` separately for counties where `Metro2013 == 1` and where `Metro2013 == 0`, reporting correlation and group sample size.</li></ol>"};

let scale=1, panX=0, panY=0, isPanning=false, _wasDragged=false, psX=0, psY=0, _mdX=0, _mdY=0;
const PT=4;
const MN=0.2, MX=5, ZS=0.15;
const svg=document.getElementById('flowchartSvg');
const zg=document.getElementById('zoomGroup');
const gp=document.getElementById('graphPanel');
const tooltip=document.getElementById('nodeTooltip');

function applyTransform(){
  zg.setAttribute('transform','translate('+panX+','+panY+') scale('+scale+')');
  document.getElementById('zoomLevel').textContent=Math.round(scale*100)+'%';
}
function zoomIn(){ scale=Math.min(MX,scale+ZS); applyTransform(); }
function zoomOut(){ scale=Math.max(MN,scale-ZS); applyTransform(); }
function zoomReset(){ scale=1;panX=0;panY=0;applyTransform(); }
function zoomFit(){
  var b=zg.getBBox(),v=svg.viewBox.baseVal,p=30;
  scale=Math.min((v.width-p*2)/b.width,(v.height-p*2)/b.height,MX);
  panX=(v.width/scale-b.width)/2-b.x+p/scale;
  panY=(v.height/scale-b.height)/2-b.y+p/scale;
  applyTransform();
}

gp.addEventListener('wheel',function(e){
  e.preventDefault();
  var r=svg.getBoundingClientRect(),v=svg.viewBox.baseVal;
  var sx=((e.clientX-r.left)/r.width)*v.width, sy=((e.clientY-r.top)/r.height)*v.height;
  var os=scale;
  scale=e.deltaY<0?Math.min(MX,scale+ZS):Math.max(MN,scale-ZS);
  panX=sx/scale-sx/os+panX; panY=sy/scale-sy/os+panY; applyTransform();
},{passive:false});

gp.addEventListener('mousedown',function(e){
  if(e.button===0||e.button===1){
    e.preventDefault();isPanning=true;_wasDragged=false;
    psX=e.clientX;psY=e.clientY;_mdX=e.clientX;_mdY=e.clientY;
    gp.style.cursor='grabbing';
  }
});
window.addEventListener('mousemove',function(e){
  if(!isPanning)return;
  var dist=Math.abs(e.clientX-_mdX)+Math.abs(e.clientY-_mdY);
  if(dist>PT)_wasDragged=true;
  var v=svg.viewBox.baseVal,r=svg.getBoundingClientRect();
  panX+=(e.clientX-psX)*(v.width/r.width)/scale;
  panY+=(e.clientY-psY)*(v.height/r.height)/scale;
  psX=e.clientX;psY=e.clientY;applyTransform();
});
window.addEventListener('mouseup',function(){ if(isPanning){isPanning=false;gp.style.cursor='';} });
gp.addEventListener('click',function(e){ if(_wasDragged){e.stopPropagation();_wasDragged=false;} },true);

// ── Hover highlight: direct connections only ──
function getConnected(nid){
  var edges=document.querySelectorAll('.edge-line');
  var visited={};
  var connEdges=[];
  visited[nid]=true;
  edges.forEach(function(e){
    var f=e.getAttribute('data-from'), t=e.getAttribute('data-to');
    if(f===nid){ connEdges.push(e); visited[t]=true; }
    if(t===nid){ connEdges.push(e); visited[f]=true; }
  });
  return {nodes:visited, edges:connEdges};
}

function hlNode(nid){
  var conn=getConnected(nid);
  // Highlight connected edges
  document.querySelectorAll('.edge-line').forEach(function(e){
    if(conn.edges.indexOf(e)>=0) e.classList.add('highlighted');
  });
  // Dim unconnected nodes
  document.querySelectorAll('.node-box').forEach(function(g){
    var id=g.getAttribute('data-nid');
    if(id && !conn.nodes[id]) g.classList.add('dimmed');
  });
  // Tooltip
  var name=nodeNames[nid]||'';
  if(name){
    tooltip.textContent=name;
    tooltip.style.display='block';
  }
}

function ulNode(){
  document.querySelectorAll('.edge-line.highlighted').forEach(function(e){ e.classList.remove('highlighted'); });
  document.querySelectorAll('.node-box.dimmed').forEach(function(g){ g.classList.remove('dimmed'); });
  tooltip.style.display='none';
}

// Position tooltip near cursor
document.addEventListener('mousemove',function(e){
  if(tooltip.style.display==='block'){
    tooltip.style.left=(e.clientX+12)+'px';
    tooltip.style.top=(e.clientY-28)+'px';
  }
});

function showPopup(nodeId){
  var c=document.getElementById('popupContent');
  var o=document.getElementById('popupOverlay');
  c.innerHTML=details[nodeId]||'<p style="color:#999">No details.</p>';
  o.classList.add('visible');
  document.querySelectorAll('.node-box ellipse,.node-box rect').forEach(function(el){
    el.setAttribute('stroke',el.getAttribute('data-os')||'#333');
    el.setAttribute('stroke-width',el.tagName==='rect'?'2':'1.5');
  });
  var cl=event.currentTarget.querySelector('ellipse,rect');
  if(cl){ cl.setAttribute('stroke-width','3.5'); cl.setAttribute('stroke','#FFD700'); }
}
function closePopup(e){
  if(e&&e.target!==document.getElementById('popupOverlay'))return;
  document.getElementById('popupOverlay').classList.remove('visible');
  document.querySelectorAll('.node-box ellipse,.node-box rect').forEach(function(el){
    el.setAttribute('stroke',el.getAttribute('data-os')||'#333');
    el.setAttribute('stroke-width',el.tagName==='rect'?'2':'1.5');
  });
}
document.addEventListener('keydown',function(e){ if(e.key==='Escape')closePopup(); });
window.addEventListener('DOMContentLoaded',function(){ setTimeout(zoomFit,100); });
