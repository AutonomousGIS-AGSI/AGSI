<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Figures &middot; AGSI</title>
<style>
  :root {
    --bg: #2a2a2e;
    --panel: #353539;
    --panel-hover: #3f3f44;
    --border: #45454b;
    --border-strong: #54545a;
    --text: #ececec;
    --muted: #aeaeb6;
    --accent: #d6b878;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: #e3c587; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 64px 28px 96px; }
  .crumb { font-size: .82rem; color: var(--muted); margin-bottom: 18px; letter-spacing: .04em; }
  .crumb a { color: var(--muted); }
  .crumb a:hover { color: var(--text); }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: 2rem;
    margin: 0 0 12px;
  }
  .lede { color: #c5c5cc; margin: 0 0 40px; max-width: 60ch; }

  .grid {
    display: grid;
    gap: 18px;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  }
  figure {
    margin: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    transition: border-color .15s, background .15s;
  }
  figure:hover { background: var(--panel-hover); border-color: var(--border-strong); }
  figure a {
    display: block;
    background: #fafafa;
    border-radius: 5px;
    overflow: hidden;
    aspect-ratio: 4 / 3;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  figure img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }
  figcaption {
    margin-top: 10px;
    font-size: .85rem;
    color: var(--muted);
    letter-spacing: .04em;
  }
  .group-title {
    grid-column: 1 / -1;
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 400;
    font-size: 1.1rem;
    margin: 8px 0 -4px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 18px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="crumb"><a href="../index.html">&larr; AGSI</a></div>

  <p class="lede">Maps, charts, and diagrams referenced across the manuscripts. Click any thumbnail to open the full-resolution file.</p>

</html>
